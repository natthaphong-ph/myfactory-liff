<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Factory — Control Panel</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{--navy:#0F172A;--teal:#0D9488;--amber:#D97706;--snow:#FAFAFA;--charcoal:#1E293B;
      --surface:#F1F5F9;--border:#E5E7EB;--red:#EF4444;--green:#10B981;--muted:#64748B;--info:#185FA5;--infobg:#E6F1FB;}
    *{box-sizing:border-box}
    body{margin:0;font-family:"IBM Plex Sans Thai",sans-serif;background:var(--snow);color:var(--charcoal)}
    header{background:var(--navy);color:#fff;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    header h1{font-size:17px;margin:0;font-weight:600}.who{font-size:12px;color:#cbd5e1}
    .shell{display:flex;max-width:1180px;margin:0 auto;min-height:calc(100vh - 50px)}
    nav{width:230px;background:#fff;border-right:1px solid var(--border);padding:12px 10px;flex:none}
    .grp{font-size:13px;font-weight:600;color:var(--navy);padding:10px 8px 1px}
    .grpd{font-size:11px;color:var(--muted);padding:0 8px 6px}
    .nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--charcoal);cursor:pointer}
    .nav:hover{background:var(--surface)}
    .nav.active{background:var(--infobg);color:var(--info);border-left:3px solid var(--info)}
    .nav .n{display:inline-block;width:16px;color:var(--muted);font-size:11px}
    main{flex:1;padding:18px;min-width:0}
    .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
    h2{font-size:17px;margin:0 0 2px;color:var(--navy);font-weight:600}.sub{font-size:12px;color:var(--muted);margin-bottom:14px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--border)}
    th{color:var(--muted);font-size:11px;text-transform:uppercase}
    input,select{padding:8px;border:1px solid var(--border);border-radius:7px;font-size:13px;width:100%}
    .btn{border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;background:var(--teal)}
    .btn.sm{padding:5px 10px;font-size:12px}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.gray{background:var(--muted)}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
    .b-active{background:#ECFDF5;color:var(--green)}.b-pending{background:#FFFBEB;color:var(--amber)}.b-revoked{background:#FEF2F2;color:var(--red)}
    .addrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-top:10px;align-items:end}
    .linkrow{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--charcoal);margin-bottom:10px}
    .linkrow:hover{background:var(--surface)} .linkrow .t{flex:1} .linkrow .t b{color:var(--navy)} .linkrow .t span{font-size:12px;color:var(--muted)}
    .soon{border-style:dashed;color:var(--muted)}
    .busy{position:fixed;inset:0;background:rgba(250,250,250,.7);display:none;align-items:center;justify-content:center;z-index:50;font-weight:600;color:var(--navy)}
    .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px}
    @media(max-width:760px){.shell{flex-direction:column}nav{width:auto;border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <header><h1>My Factory — Control Panel</h1><span class="who" id="who"></span></header>
  <div class="shell">
    <nav id="nav"></nav>
    <main id="main"><div class="empty">Connecting to LINE…</div></main>
  </div>
  <div class="busy" id="busy">Working…</div>
  <script>
    var LIFF_ID='2010250488-MyQiwlFp';
    var API_URL='https://script.google.com/macros/s/AKfycbyRJP-fDdUKFkAd5LmdBUXVM6wAb83i2leOueJ-d1Uw_czlnujTq-csD2WGGkkxcNWE/exec';
    var DASH_URL='https://natthaphong-ph.github.io/myfactory-liff/genba-dashboard.html';
    var idToken=null, BOOT=null, M=null, SEC='kyc', BUSY=false;
    var $=function(id){return document.getElementById(id);};
    function busyOn(m){BUSY=true;$('busy').textContent=m||'Working…';$('busy').style.display='flex';}
    function busyOff(){BUSY=false;$('busy').style.display='none';}
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function api(a,e){return fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({action:a,idToken:idToken},e||{}))}).then(function(r){return r.json();});}
    function reauth(){if(sessionStorage.getItem('reauth')){$('main').innerHTML='<div class="empty">Session expired — close and reopen.</div>';return;}sessionStorage.setItem('reauth','1');try{liff.logout();}catch(e){}liff.login();}

    var CONFIG_SECTIONS=[
      {key:'dept',title:'Departments',data:'depts',cols:['DeptID','DeptName'],add:[{f:'DeptID'},{f:'DeptName'}]},
      {key:'emp',title:'Employees',data:'employees',cols:['EmpID','FullName','Dept','Position','Status'],toggle:true,
        add:[{f:'EmpID'},{f:'FullName'},{f:'Dept',src:'depts',val:'DeptID',label:'DeptName'},{f:'Position'},{f:'Status',opts:['active','inactive']}]},
      {key:'area',title:'Areas',data:'areas',cols:['AreaID','AreaName','Zone','OwnerDept'],
        add:[{f:'AreaID'},{f:'AreaName'},{f:'Zone'},{f:'OwnerDept',src:'depts',val:'DeptID',label:'DeptName'}]},
      {key:'cat',title:'5S Categories',data:'categories',cols:['CatID','CatName'],add:[{f:'CatID'},{f:'CatName'}]},
      {key:'group',title:'Groups',data:'groups',cols:['GroupID','GroupName','OwnerDept'],
        add:[{f:'GroupID'},{f:'GroupName'},{f:'OwnerDept',src:'depts',val:'DeptID',label:'DeptName'}]},
      {key:'member',title:'Group Members',data:'members',cols:['GroupID','EmpID'],
        add:[{f:'GroupID',src:'groups',val:'GroupID',label:'GroupName'},{f:'EmpID',src:'employees',val:'EmpID',label:'FullName'}]}
    ];

    function boot(){
      liff.init({liffId:LIFF_ID}).then(function(){
        if(!liff.isLoggedIn()){liff.login();return;}
        idToken=liff.getIDToken();
        return api('cpBoot').then(function(r){
          if(r&&r.error&&/expired|IdToken|verify failed/i.test(r.error)){reauth();return;}
          sessionStorage.removeItem('reauth');
          if(!r||!r.ok){$('main').innerHTML='<div class="empty">'+((r&&r.error)||'No Control Panel access')+'</div>';return;}
          BOOT=r; $('who').textContent=r.empName; buildNav();
          SEC=r.canApprove?'kyc':(r.canDashboard?'report':'dept'); show(SEC);
        });
      }).catch(function(e){$('main').innerHTML='<div class="empty">LINE error: '+e+'</div>';});
    }
    function buildNav(){
      var h='';
      if(BOOT.canApprove){h+='<div class="grp">Approve</div><div class="grpd">อนุมัติสิทธิผู้ใช้งาน</div>'+navItem('kyc','ti','KYC approval');}
      if(BOOT.canDashboard){h+='<div class="grp">Dashboard & Report</div><div class="grpd">รายงาน & แดชบอร์ด</div>'+navItem('report','ti','System reports');}
      if(BOOT.canConfig){h+='<div class="grp">Configuration</div><div class="grpd">ตั้งค่าระบบ (เรียงตามลำดับ)</div>'+
        CONFIG_SECTIONS.map(function(s,i){return navItem(s.key,(i+1),s.title);}).join('');}
      $('nav').innerHTML=h;
    }
    function navItem(key,n,label){return '<div class="nav" data-k="'+key+'" onclick="show(\''+key+'\')"><span class="n">'+(n==='ti'?'·':n)+'</span>'+esc(label)+'</div>';}

    function show(sec){
      SEC=sec;
      document.querySelectorAll('.nav').forEach(function(e){e.classList.toggle('active',e.dataset.k===sec);});
      if(sec==='kyc')renderKyc();
      else if(sec==='report')renderReport();
      else loadConfig(sec);
    }

    /* ---- Approve ---- */
    function renderKyc(){
      var rows=BOOT.kyc||[], pend=rows.filter(function(r){return r.KycStatus==='pending';});
      $('main').innerHTML='<h2>KYC approval</h2><div class="sub">อนุมัติ/เพิกถอนสิทธิผู้ใช้งาน</div>'+
        '<div class="card"><h3>Pending ('+pend.length+')</h3>'+kycTable(pend)+'</div>'+
        '<div class="card"><h3>All</h3>'+kycTable(rows)+'</div>';
    }
    function badge(s){var c=s==='active'?'b-active':(s==='revoked'?'b-revoked':'b-pending');return '<span class="badge '+c+'">'+esc(s)+'</span>';}
    function kycTable(rows){if(!rows.length)return '<div class="empty">None</div>';
      return '<table><thead><tr><th>EmpID</th><th>LINE name</th><th>Status</th><th></th></tr></thead><tbody>'+
        rows.map(function(r){return '<tr><td>'+esc(r.EmpID)+'</td><td>'+esc(r.DisplayName)+'</td><td>'+badge(r.KycStatus)+'</td><td>'+
          (r.KycStatus!=='active'?'<button class="btn green sm" onclick="kyc(\'approve\',\''+esc(r.KycID)+'\')">Approve</button> ':'')+
          (r.KycStatus!=='revoked'?'<button class="btn red sm" onclick="kyc(\'revoke\',\''+esc(r.KycID)+'\')">Revoke</button>':'')+'</td></tr>';}).join('')+'</tbody></table>';}
    function kyc(act,id){if(BUSY)return;busyOn();
      api(act==='approve'?'cpKycApprove':'cpKycRevoke',{kycId:id}).then(function(r){busyOff();if(!r.ok){alert(r.error||r.reason);return;}
        api('cpBoot').then(function(b){if(b.ok){BOOT=b;renderKyc();}});});}

    /* ---- Dashboard & Report (links) ---- */
    function renderReport(){
      $('main').innerHTML='<h2>System reports</h2><div class="sub">เปิดรายงาน/แดชบอร์ดในแท็บใหม่</div>'+
        link(DASH_URL,'Genba & 5S dashboard','KPI · กราฟ · findings · พิมพ์รายงาน')+
        '<div class="linkrow soon"><div class="t"><b>TPM TAG dashboard</b><br><span>เร็ว ๆ นี้</span></div></div>'+
        '<div class="linkrow soon"><div class="t"><b>Check-in dashboard</b><br><span>เร็ว ๆ นี้</span></div></div>';
    }
    function link(url,t,d){return '<a class="linkrow" href="'+esc(url)+'" target="_blank" rel="noopener"><div class="t"><b>'+esc(t)+'</b><br><span>'+esc(d)+'</span></div>↗</a>';}

    /* ---- Configuration ---- */
    function loadConfig(secKey){
      if(M){renderConfig(secKey);return;}
      busyOn('Loading…');
      api('cpMasters').then(function(r){busyOff();if(!r.ok){$('main').innerHTML='<div class="empty">'+(r.error||'error')+'</div>';return;}M=r;renderConfig(secKey);});
    }
    function dmap(arr,k,v){var o={};(arr||[]).forEach(function(x){o[x[k]]=x[v];});return o;}
    function resolveCell(secKey,col,val){
      var D=dmap(M.depts,'DeptID','DeptName'), G=dmap(M.groups,'GroupID','GroupName'), E=dmap(M.employees,'EmpID','FullName');
      if((secKey==='emp'&&col==='Dept')||((secKey==='area'||secKey==='group')&&col==='OwnerDept'))return D[val]||val||'-';
      if(secKey==='member'&&col==='GroupID')return G[val]||val;
      if(secKey==='member'&&col==='EmpID')return E[val]||val;
      return val;
    }
    function renderConfig(secKey){
      var s=CONFIG_SECTIONS.filter(function(x){return x.key===secKey;})[0]; if(!s)return;
      var rows=M[s.data]||[];
      var head='<tr>'+s.cols.map(function(c){return '<th>'+c+'</th>';}).join('')+(s.toggle?'<th></th>':'')+'</tr>';
      var body=rows.map(function(r){return '<tr>'+s.cols.map(function(c){return '<td>'+esc(resolveCell(s.key,c,r[c]))+'</td>';}).join('')+
        (s.toggle?'<td><button class="btn gray sm" onclick="toggleEmp(\''+esc(r.EmpID)+'\',\''+esc(r.Status)+'\')">'+(String(r.Status).toLowerCase()==='active'?'Set inactive':'Set active')+'</button></td>':'')+'</tr>';}).join('');
      var inputs=s.add.map(function(fd){return addField(s.key,fd);}).join('');
      $('main').innerHTML='<h2>'+esc(s.title)+'</h2><div class="sub">'+addHint(s.key)+'</div>'+
        '<div class="card"><table><thead>'+head+'</thead><tbody>'+(body||'')+'</tbody></table>'+
        '<div class="addrow">'+inputs+'<button class="btn" onclick="addRow(\''+s.key+'\')">+ Add</button></div></div>';
    }
    function addHint(k){return k==='member'?'GroupID/EmpID เลือกจากรายการ':(k==='emp'||k==='area'||k==='group'?'ช่องที่ link เลือกจาก dropdown':'เพิ่มรายการใหม่');}
    function addField(secKey,fd){
      var id='add_'+secKey+'_'+fd.f;
      if(fd.opts) return '<select id="'+id+'">'+fd.opts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select>';
      if(fd.src){
        var list=M[fd.src]||[];
        return '<select id="'+id+'"><option value="">'+esc(fd.f)+'…</option>'+list.map(function(x){
          var v=x[fd.val]; var lbl=fd.label?x[fd.label]:v; return '<option value="'+esc(v)+'">'+esc(lbl)+'</option>';}).join('')+'</select>';
      }
      return '<input id="'+id+'" placeholder="'+esc(fd.f)+'">';
    }
    function addRow(secKey){
      if(BUSY)return;
      var s=CONFIG_SECTIONS.filter(function(x){return x.key===secKey;})[0];
      var values=s.add.map(function(fd){return $('add_'+secKey+'_'+fd.f).value;});
      if(!values[0]){alert('First field required');return;}
      busyOn('Adding…');
      api('cpAddRow',{table:secKey,values:values}).then(function(r){busyOff();if(!r.ok){alert(r.error||r.reason);return;}M=null;loadConfig(secKey);});
    }
    function toggleEmp(empId,cur){
      if(BUSY)return;busyOn();
      var nv=String(cur).toLowerCase()==='active'?'inactive':'active';
      api('cpSetCell',{table:'emp',keyField:'EmpID',keyVal:empId,field:'Status',value:nv}).then(function(r){busyOff();if(!r.ok){alert(r.error||r.reason);return;}M=null;loadConfig('emp');});
    }
    boot();
  </script>
</body>
</html>
