<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Factory — Control Panel</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="fonts/plex-thai.css">
  <style>
    :root{--navy:#0F172A;--teal:#0D9488;--teal-d:#0b7a70;--amber:#D97706;--snow:#F8FAFC;--charcoal:#1E293B;
      --surface:#F1F5F9;--border:#E8ECF1;--red:#EF4444;--green:#10B981;--muted:#64748B;--info:#0D9488;--infobg:#ECFDFA;
      --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);--shadow-md:0 6px 20px rgba(15,23,42,.09);}
    *{box-sizing:border-box}
    body{margin:0;font-family:"IBM Plex Sans Thai",system-ui,sans-serif;background:var(--snow);color:var(--charcoal);-webkit-font-smoothing:antialiased}
    /* top bar */
    header{background:var(--navy);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30}
    header .bk{cursor:pointer;font-size:22px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;flex:none;border-radius:8px;transition:background .15s}
    header .bk:hover{background:rgba(255,255,255,.12)}
    header h1{font-size:16px;margin:0;font-weight:600;flex:1;color:#fff;letter-spacing:.01em}
    .who{font-size:12.5px;color:#cbd5e1;font-weight:500}
    /* layout */
    .shell{display:flex;max-width:1240px;margin:0 auto;min-height:calc(100vh - 56px)}
    nav{width:248px;background:#fff;border-right:1px solid var(--border);padding:16px 12px;flex:none}
    .grp{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:16px 10px 1px}
    .grpd{font-size:11px;color:#94A3B8;padding:0 10px 9px}
    .nav{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--charcoal);cursor:pointer;transition:background .12s,color .12s;margin-bottom:1px}
    .nav:hover{background:var(--surface)}
    .nav.active{background:var(--infobg);color:var(--teal);font-weight:600}
    .nav .n{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:6px;background:var(--surface);color:var(--muted);font-size:11px;font-weight:700;flex:none}
    .nav.active .n{background:var(--teal);color:#fff}
    main{flex:1;padding:24px;min-width:0}
    .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
    h2{font-size:19px;margin:0 0 3px;color:var(--navy);font-weight:700;letter-spacing:-.01em}
    h3{font-size:14px;margin:0 0 10px;color:var(--navy);font-weight:600}
    .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
    /* table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
    th{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;cursor:pointer;user-select:none;white-space:nowrap}
    th:hover{color:var(--navy)} th .so{opacity:.7;font-size:10px}
    tbody tr{transition:background .1s} tbody tr:hover{background:var(--surface)}
    /* inputs */
    input,select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:100%;background:#fff;color:var(--charcoal);font-family:inherit;transition:border-color .12s,box-shadow .12s}
    input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.15)}
    .note{background:var(--infobg);border:1px solid #CFF3EC;color:var(--navy);border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.9;margin-bottom:14px}
    .note code{background:#fff;border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:12px;color:var(--teal);font-family:ui-monospace,Menlo,monospace}
    .note a{color:var(--teal);font-weight:600;text-decoration:none}.note a:hover{text-decoration:underline}
    .cardh{font-size:13px;font-weight:700;color:var(--navy)}
    .listh{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .filterbox{width:240px;max-width:60%}
    .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tablewrap table{margin:0}
    /* the Add frame sticks just under the fixed header while the list scrolls with the page */
    .addcard{position:sticky;top:56px;z-index:6}
    /* buttons */
    .btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;background:var(--teal);font-family:inherit;transition:background .12s,transform .05s,box-shadow .12s}
    .btn:hover{background:var(--teal-d);box-shadow:var(--shadow)} .btn:active{transform:translateY(1px)}
    .btn.sm{padding:5px 11px;font-size:12px}
    .btn.green{background:var(--green)}.btn.green:hover{background:#0e9f6e}
    .btn.red{background:var(--red)}.btn.red:hover{background:#dc2626}.btn.gray{background:var(--muted)}
    .btn.rv{background:#fff;color:var(--red);border:1px solid #FECACA}.btn.rv:hover{background:#FEF2F2;box-shadow:none}
    /* badges with status dot */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;line-height:1.5}
    .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
    .b-active{background:#ECFDF5;color:#059669}.b-pending{background:#FFFBEB;color:#B45309}.b-revoked{background:#FEF2F2;color:#DC2626}
    /* misc */
    .addrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);align-items:end}
    .linkrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--charcoal);margin-bottom:10px;transition:background .12s,box-shadow .12s,border-color .12s}
    .linkrow:hover{box-shadow:var(--shadow-md);border-color:var(--teal)} .linkrow .t{flex:1} .linkrow .t b{color:var(--navy);font-size:14px} .linkrow .t span{font-size:12px;color:var(--muted)}
    .soon{border-style:dashed;color:var(--muted);opacity:.7}
    .busy{position:fixed;inset:0;background:rgba(248,250,252,.7);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:50;font-weight:600;color:var(--navy)}
    .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px}
    @media(max-width:760px){
      .shell{flex-direction:column}
      nav{width:auto;border-right:none;border-bottom:1px solid var(--border)}
      main{padding:14px}
      .listh{flex-direction:column;align-items:stretch}
      .filterbox{width:100%;max-width:100%}
      .who{display:none}
      table{font-size:12.5px}
      .addrow{grid-template-columns:1fr 1fr}
    }
    @media(max-width:460px){.addrow{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><a class="bk" href="app.html">‹</a><h1>My Factory — Control Panel</h1><span class="who" id="who"></span></header>
  <div class="shell">
    <nav id="nav"></nav>
    <main id="main"><div class="empty">Connecting to LINE…</div></main>
  </div>
  <div class="busy" id="busy">Working…</div>
  <script>
    /* ===== CONFIG (Supabase backend) ===== */
    var LIFF_ID='2010250488-MyQiwlFp';
    var FN_URL='https://jmedgllujclrhpjdrfcu.supabase.co/functions/v1/line-auth';
    var PUBKEY='sb_publishable_0YCGBZ5wt_dTpDB-TlLpiQ_aGMctwXZ';
    var DASH_URL='genba-dashboard.html';
    /* ===================================== */
    var idToken=null, BOOT=null, M=null, SEC='kyc', BUSY=false;
    var $=function(id){return document.getElementById(id);};
    function busyOn(m){BUSY=true;$('busy').textContent=m||'Working…';$('busy').style.display='flex';}
    function busyOff(){BUSY=false;$('busy').style.display='none';}
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function api(a,e){return fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+PUBKEY,'apikey':PUBKEY},body:JSON.stringify(Object.assign({action:a,idToken:idToken},e||{}))}).then(function(r){return r.json();});}
    function reauth(){lcClear();if(sessionStorage.getItem('reauth')){$('main').innerHTML='<div class="empty">Session expired — close and reopen</div>';return;}sessionStorage.setItem('reauth','1');try{liff.logout();}catch(e){}liff.login();}

    /* SYSTEM CONFIGURATION = core entities used across the whole portal */
    var CONFIG_SECTIONS=[
      {key:'dept',title:'Departments',data:'depts',idField:'DeptID',cols:[
        {f:'DeptID',id:true},{f:'DeptName'}]},
      {key:'emp',title:'Employees',data:'employees',idField:'EmpID',
        note:'<b>Dept</b> = home department (primary, one only). Extra departments for multi-line supervisors → manage in <b>Employee → Extra Dept</b> below.',
        cols:[
        {f:'EmpID',id:true},{f:'FullName'},{f:'Dept',src:'depts',val:'DeptID',label:'DeptName'},{f:'Position'},{f:'Status',opts:['active','inactive']}]},
      {key:'empdept',title:'Employee → Extra Dept',data:'empDepts',idField:null,addonly:true,
        note:'Grant <b>EXTRA</b> departments to a supervisor who manages multiple lines (in addition to the home dept set in Employees). They can then see &amp; close/edit work in the home dept + these extra depts — without the all-access cross-dept permission. The home dept cannot be added here.',
        cols:[{f:'EmpID',src:'employees',val:'EmpID',label:'FullName',activeOnly:true},{f:'DeptID',src:'depts',val:'DeptID',label:'DeptName'}]},
      {key:'group',title:'Groups & Members',data:'groups',idField:'GroupID',cols:[
        {f:'GroupID',id:true},{f:'GroupName'}]},
      {key:'app',title:'Apps',data:'apps',idField:'AppID',
        note:'<b>Icon</b> = a Tabler icon name (e.g. <code>settings</code>, <code>tag</code>, <code>clock-check</code>) or an emoji 📋. Browse &amp; copy the exact name at <a href="https://tabler.io/icons" target="_blank" rel="noopener">tabler.io/icons ↗</a> &nbsp;|&nbsp; <b>AppURL</b> = page filename (e.g. <code>checkin.html</code>) &nbsp;|&nbsp; <b>SortOrder</b> = tile order on Home (lower = first) &nbsp;|&nbsp; <b>Status</b> = on shows the app (still needs a Role → Permission grant to appear).',
        cols:[
        {f:'AppID',id:true},{f:'AppName'},{f:'AppURL'},{f:'Icon'},{f:'SortOrder'},{f:'Status',opts:['on','off']}]},
      {key:'role',title:'Roles',data:'roles',idField:'RoleID',cols:[
        {f:'RoleID',id:true},{f:'RoleName'},{f:'Description'}]},
      {key:'roleperm',title:'Role → Permission',data:'rolePerms',idField:null,addonly:true,
        note:'<b>Permission scope</b> &nbsp; <code>view</code> read data · <code>create</code> add records (e.g. a finding) · <code>close</code> verify &amp; close (Done→Closed) · <code>approve</code> approve requests (KYC / work) · <code>dashboard</code> open dashboards &amp; reports · <code>cross-dept</code> see &amp; act across departments · <code>config</code> edit system master data · <code>grant</code> grant/revoke roles &amp; permissions. &nbsp;<i>Each permission applies only within the app it is granted for.</i>',
        cols:[
        {f:'RoleID',src:'roles',val:'RoleID',label:'RoleName'},
        {f:'AppID',src:'apps',val:'AppID',label:'AppName'},
        {f:'PermID',src:'permissions',val:'PermID',label:'PermName'}]}
    ];
    /* APP CONFIGURATION (Genba & 5S) = data specific to one app — add more groups per app here */
    var GENBA_SECTIONS=[
      {key:'area',title:'Areas',data:'areas',idField:'AreaID',cols:[
        {f:'AreaID',id:true},{f:'AreaName'},{f:'Zone'},{f:'OwnerDept',src:'depts',val:'DeptID',label:'DeptName'}]},
      {key:'cat',title:'5S Categories',data:'categories',idField:'CatID',cols:[
        {f:'CatID',id:true},{f:'CatName'}]}
    ];
    /* ACCESS CONTROL = assign people: give roles, then put them in groups */
    var ACCESS_SECTIONS=[
      {key:'userrole',title:'User → Role',data:'userRoles',idField:null,addonly:true,move:true,cols:[
        {f:'EmpID',src:'employees',val:'EmpID',label:'FullName',activeOnly:true},
        {f:'RoleID',src:'roles',val:'RoleID',label:'RoleName'}]},
      {key:'member',title:'Group Members',data:'members',idField:null,addonly:true,move:true,cols:[
        {f:'GroupID',src:'groups',val:'GroupID',label:'GroupName'},{f:'EmpID',src:'employees',val:'EmpID',label:'FullName',activeOnly:true}]}
    ];

    var LC='mfccp_';
    function lcGet(k,ttl){try{var o=JSON.parse(localStorage.getItem(LC+k)||'null');if(o&&(Date.now()-o.t)<ttl*1000)return o.d;}catch(e){}return null;}
    function lcPut(k,d){try{localStorage.setItem(LC+k,JSON.stringify({t:Date.now(),d:d}));}catch(e){}}
    function lcClear(){try{Object.keys(localStorage).forEach(function(k){if(k.indexOf(LC)===0)localStorage.removeItem(k);});}catch(e){}}
    function applyBoot(r){
      BOOT=r; $('who').textContent=r.empName; buildNav();
      if(!SEC){ SEC=r.canApprove?'kyc':(r.canDashboard?'report':(r.canConfig?'dept':(r.canGrant?'userrole':null))); }
      if(SEC)show(SEC); else $('main').innerHTML='<div class="empty">No Control Panel access</div>';
    }
    function boot(){
      liff.init({liffId:LIFF_ID}).then(function(){
        if(!liff.isLoggedIn()){liff.login();return;}
        idToken=liff.getIDToken();
        var cached=lcGet('cpboot',60);
        if(cached&&cached.ok) applyBoot(cached);
        return api('cpBoot').then(function(r){
          if(r&&(r.code||r.error)&&/expired|IdToken|verify failed/i.test(r.code||r.error)){reauth();return;}
          sessionStorage.removeItem('reauth');
          if(!r||!r.ok){ if(!cached)$('main').innerHTML='<div class="empty">'+esc((r&&r.error)||'No Control Panel access')+'</div>'; return; }
          lcPut('cpboot',r); applyBoot(r);
        });
      }).catch(function(e){$('main').innerHTML='<div class="empty">LINE error: '+e+'</div>';});
    }
    /* re-fetch boot (KYC list + perms) — used after changes that affect KYC, e.g. employee active/inactive */
    function refreshBoot(cb){api('cpBoot').then(function(r){if(r&&r.ok){BOOT=r;lcPut('cpboot',r);}if(cb)cb();});}
    function buildNav(){
      var h='';
      if(BOOT.canApprove){h+='<div class="grp">Approve</div><div class="grpd">Approve user access</div>'+navItem('kyc','ti','KYC approval');}
      if(BOOT.canDashboard){h+='<div class="grp">Dashboard & Report</div><div class="grpd">Reports & dashboards</div>'+navItem('report','ti','System reports');}
      if(BOOT.canConfig){h+='<div class="grp">Configuration</div><div class="grpd">System configuration</div>'+
        CONFIG_SECTIONS.map(function(s){return navItem(s.key,'ti',s.title);}).join('');}
      if(BOOT.canGrant){h+='<div class="grp">Access control</div><div class="grpd">Manage user permissions (admins only)</div>'+
        ACCESS_SECTIONS.filter(function(s){return s.key!=='member';}).map(function(s){return navItem(s.key,'ti',s.title);}).join('');}
      if(BOOT.canConfig){h+='<div class="grp">Genba configuration</div><div class="grpd">Genba &amp; 5S app data</div>'+
        GENBA_SECTIONS.map(function(s){return navItem(s.key,'ti',s.title);}).join('');}
      $('nav').innerHTML=h;
    }
    function navItem(key,n,label){return '<div class="nav" data-k="'+key+'" onclick="show(\''+key+'\')"><span class="n">'+(n==='ti'?'·':n)+'</span>'+esc(label)+'</div>';}

    function show(sec){
      SEC=sec;
      document.querySelectorAll('.nav').forEach(function(e){e.classList.toggle('active',e.dataset.k===sec);});
      if(sec==='kyc')renderKyc();
      else if(sec==='report')renderReport();
      else loadConfig(sec);
    }

    /* ---- Approve ---- */
    function renderKyc(){
      var rows=BOOT.kyc||[], pend=rows.filter(function(r){return r.KycStatus==='pending';});
      $('main').innerHTML='<h2>KYC approval</h2><div class="sub">Approve / revoke user access</div>'+
        '<div class="card"><h3>Pending ('+pend.length+')</h3>'+kycTable(pend)+'</div>'+
        '<div class="card"><div class="listh"><div class="cardh">All ('+rows.length+')</div>'+
        '<input class="filterbox" placeholder="🔎 Filter…" oninput="filterTable(this)"></div>'+
        '<div class="tablewrap">'+kycTable(rows)+'</div></div>';
    }
    function badge(s){var c=s==='active'?'b-active':(s==='revoked'?'b-revoked':'b-pending');return '<span class="badge '+c+'">'+esc(s)+'</span>';}
    function empBadge(s){if(!s)return '<span class="badge">—</span>';return '<span class="badge '+(s==='active'?'b-active':'b-revoked')+'">'+esc(s)+'</span>';}
    function kycTable(rows){if(!rows.length)return '<div class="empty">None</div>';
      return '<table><thead><tr><th>EmpID</th><th>LINE name</th><th>KYC status</th><th>Employee</th><th></th></tr></thead><tbody>'+
        rows.map(function(r){return '<tr><td>'+esc(r.EmpID)+'</td><td>'+esc(r.DisplayName)+'</td><td>'+badge(r.KycStatus)+'</td><td>'+empBadge(r.EmpStatus)+(r.EmpStatus==='inactive'?' <span style="font-size:11px;color:var(--red);font-weight:600">⛔ blocked</span>':'')+'</td><td>'+
          (r.KycStatus!=='active'&&r.EmpStatus!=='inactive'?'<button class="btn green sm" onclick="kyc(\'approve\',\''+esc(r.KycID)+'\')">Approve</button> ':'')+
          (r.KycStatus!=='revoked'?'<button class="btn red sm" onclick="kyc(\'revoke\',\''+esc(r.KycID)+'\')">Revoke</button>':'')+'</td></tr>';}).join('')+'</tbody></table>';}
    function kyc(act,id){if(BUSY)return;
      if(act==='revoke'&&!confirm('Revoke this user\'s KYC access?'))return;
      busyOn();
      api(act==='approve'?'cpKycApprove':'cpKycRevoke',{kycId:id}).then(function(r){busyOff();if(!r.ok){alert(r.error||r.reason);return;}
        api('cpBoot').then(function(b){if(b.ok){BOOT=b;lcPut('cpboot',b);renderKyc();}});});}

    /* ---- Dashboard & Report (links) ---- */
    /* ---- System report: live system-health + access overview for admins (computed client-side) ---- */
    function renderReport(){
      if((BOOT.canConfig||BOOT.canGrant)&&!M){
        busyOn('Loading…');
        var pM=BOOT.canConfig?api('cpMasters'):Promise.resolve(null);
        var pA=BOOT.canGrant?api('cpAccess'):Promise.resolve(null);
        Promise.all([pM,pA]).then(function(res){var m=res[0],a=res[1];
          if(BOOT.canConfig){M=(m&&m.ok)?m:{};}else{M={};}
          if(BOOT.canGrant&&a&&a.ok)mergeAccess(a);
          busyOff();renderReport();});
        return;
      }
      if(!BOOT.canConfig&&!BOOT.canGrant){$('main').innerHTML='<h2>System report</h2><div class="empty">Needs admin (config / grant) access</div>';return;}
      var emps=M.employees||[],kyc=BOOT.kyc||[],depts=M.depts||[],groups=M.groups||[],members=M.members||[],areas=M.areas||[],roles=M.roles||[],apps=M.apps||[],userRoles=M.userRoles||[],rolePerms=M.rolePerms||[];
      var EN=dmap(emps,'EmpID','FullName');
      var active=emps.filter(function(e){return e.Status==='active';}),inactive=emps.filter(function(e){return e.Status==='inactive';});
      var kycP=kyc.filter(function(k){return k.KycStatus==='pending';}),kycA=kyc.filter(function(k){return k.KycStatus==='active';}),kycR=kyc.filter(function(k){return k.KycStatus==='revoked';});
      var roleByEmp={};userRoles.forEach(function(u){(roleByEmp[u.EmpID]=roleByEmp[u.EmpID]||[]).push(u.RoleID);});
      var grpByEmp={};members.forEach(function(m){(grpByEmp[m.EmpID]=grpByEmp[m.EmpID]||[]).push(m.GroupID);});
      var permByRole={};rolePerms.forEach(function(x){permByRole[x.RoleID]=1;});
      var grantedApp={};rolePerms.forEach(function(x){grantedApp[x.AppID]=1;});
      var nmE=function(list){return list.map(function(e){return EN[e.EmpID]||e.EmpID;});};
      var noRole=nmE(active.filter(function(e){return !roleByEmp[e.EmpID];}));
      var noGroup=nmE(active.filter(function(e){return !grpByEmp[e.EmpID];}));
      var multiGroup=Object.keys(grpByEmp).filter(function(id){return grpByEmp[id].length>1;}).map(function(id){return EN[id]||id;});
      var areasNoDept=areas.filter(function(a){return !a.OwnerDept;}).map(function(a){return a.AreaName||a.AreaID;});
      var rolesNoPerm=roles.filter(function(r){return !permByRole[r.RoleID];}).map(function(r){return r.RoleName||r.RoleID;});
      var appsOnUngranted=apps.filter(function(a){return a.Status==='on'&&!grantedApp[a.AppID];}).map(function(a){return a.AppName||a.AppID;});
      var kycMismatch=kyc.filter(function(k){return k.KycStatus==='active'&&k.EmpStatus==='inactive';}).map(function(k){return k.EmpID;});
      function kpi(l,v,c){return '<div style="flex:1;min-width:110px;background:var(--surface,#f1f5f9);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:#64748b">'+esc(l)+'</div><div style="font-size:24px;font-weight:700'+(c?';color:'+c:'')+'">'+v+'</div></div>';}
      function chk(l,items,help){var n=items.length,ok=n===0,color=ok?'#10B981':'#D97706',lbl=ok?'OK':(n+' to review');
        var names=n?'<div style="font-size:11px;color:#64748b;margin-top:3px">'+esc(items.slice(0,12).join(', '))+(n>12?' …(+'+(n-12)+' more)':'')+'</div>':'';
        return '<tr><td>'+esc(l)+'<div style="font-size:11px;color:#94a3b8">'+esc(help)+'</div>'+names+'</td><td style="text-align:right;white-space:nowrap;vertical-align:top"><span style="color:'+color+'">\u25cf</span> '+esc(lbl)+'</td></tr>';}
      var h='<h2>System report</h2><div class="sub">System health &amp; access overview — computed live from current data</div>';
      h+='<div class="card"><div style="display:flex;gap:10px;flex-wrap:wrap">'+
        kpi('Employees active',active.length,'#0D9488')+kpi('Inactive',inactive.length)+
        kpi('KYC pending',kycP.length,kycP.length?'#D97706':'')+kpi('KYC active',kycA.length)+kpi('KYC revoked',kycR.length)+
        kpi('Roles',roles.length)+kpi('Apps on',apps.filter(function(a){return a.Status==='on';}).length)+'</div></div>';
      h+='<div class="card"><div class="cardh">Action needed (health checks)</div><div class="tablewrap"><table><tbody>'+
        chk('Pending KYC approvals',nmE(kycP),'Users waiting to be approved')+
        chk('Active employees with no role',noRole,'Cannot use any app until granted a role')+
        chk('Active employees in no group',noGroup,'Will not receive assigned Genba / TPM work')+
        chk('Areas with no owner department',areasNoDept,'Hidden from dept-scoped users — set OwnerDept')+
        chk('Roles with no permission',rolesNoPerm,'Dead roles — grant permissions or remove')+
        chk('Apps ON but granted to nobody',appsOnUngranted,'Invisible app — grant to a role or turn off')+
        chk('Employees in more than one group',multiGroup,'Should be 0 (1 person = 1 group)')+
        chk('KYC active but employee inactive',kycMismatch,'Should be 0 (auto-revoke) — investigate if any')+
        '</tbody></table></div></div>';
      var deptCount=function(d){return active.filter(function(e){return e.Dept===d;}).length;};
      var memCount={};members.forEach(function(m){memCount[m.GroupID]=(memCount[m.GroupID]||0)+1;});
      h+='<div class="card"><div class="cardh">Departments</div><div class="tablewrap"><table><thead><tr><th>Department</th><th>Active employees</th></tr></thead><tbody>'+
        depts.map(function(d){return '<tr><td>'+esc(d.DeptName||d.DeptID)+'</td><td>'+deptCount(d.DeptID)+'</td></tr>';}).join('')+'</tbody></table></div></div>';
      h+='<div class="card"><div class="cardh">Groups</div><div class="tablewrap"><table><thead><tr><th>Group</th><th>Members</th></tr></thead><tbody>'+
        groups.map(function(g){return '<tr><td>'+esc(g.GroupName||g.GroupID)+'</td><td>'+(memCount[g.GroupID]||0)+'</td></tr>';}).join('')+'</tbody></table></div></div>';
      $('main').innerHTML=h;
    }
    function link(url,t,d){return '<div class="linkrow" style="cursor:pointer" onclick="location.href=\''+esc(url)+'\'"><div class="t"><b>'+esc(t)+'</b><br><span>'+esc(d)+'</span></div>›</div>';}

    /* ---- Configuration ---- */
    function mergeAccess(a){if(a&&a.ok){M.roles=a.roles;M.permissions=a.permissions;M.apps=a.apps;M.userRoles=a.userRoles;M.rolePerms=a.rolePerms;M.revokedUserRoles=a.revokedUserRoles;if(!M.employees)M.employees=a.employees;}}
    function loadConfig(secKey){
      if(M){renderConfig(secKey);return;}
      busyOn('Loading…');
      function fail(e){busyOff();$('main').innerHTML='<div class="empty">'+esc(e||'error')+'</div>';}
      function done(){busyOff();renderConfig(secKey);}
      if(!BOOT.canConfig && !BOOT.canGrant){fail('No config access');return;}
      var pM=BOOT.canConfig?api('cpMasters'):Promise.resolve(null);
      var pA=BOOT.canGrant?api('cpAccess'):Promise.resolve(null);
      Promise.all([pM,pA]).then(function(res){
        var m=res[0], a=res[1];
        if(BOOT.canConfig){ if(!m||!m.ok){fail(m&&m.error);return;} M=m; } else { M={}; }
        if(BOOT.canGrant){ if(!a||!a.ok){fail(a&&a.error);return;} mergeAccess(a); }
        done();
      });
    }
    function dmap(arr,k,v){var o={};(arr||[]).forEach(function(x){o[x[k]]=x[v];});return o;}
    function resolveCell(secKey,col,val){
      var D=dmap(M.depts,'DeptID','DeptName'), G=dmap(M.groups,'GroupID','GroupName'), E=dmap(M.employees,'EmpID','FullName');
      var R=dmap(M.roles,'RoleID','RoleName'), P=dmap(M.permissions,'PermID','PermName'), A=dmap(M.apps,'AppID','AppName');
      if((secKey==='emp'&&col==='Dept')||((secKey==='area'||secKey==='group')&&col==='OwnerDept'))return D[val]||val||'-';
      if(secKey==='member'&&col==='GroupID')return G[val]||val;
      if(secKey==='member'&&col==='EmpID')return E[val]||val;
      if(secKey==='userrole'&&col==='EmpID')return E[val]||val;
      if(secKey==='empdept'&&col==='EmpID')return E[val]||val;
      if(secKey==='empdept'&&col==='DeptID')return D[val]||val;
      if((secKey==='userrole'||secKey==='roleperm')&&col==='RoleID')return R[val]||val;
      if(secKey==='roleperm'&&col==='AppID')return A[val]||val;
      if(secKey==='roleperm'&&col==='PermID')return P[val]||val;
      return val;
    }
    function sec_(k){return CONFIG_SECTIONS.concat(GENBA_SECTIONS).concat(ACCESS_SECTIONS).filter(function(x){return x.key===k;})[0];}
    function fieldHtml(domId,c,cur,addMode){
      if(c.opts) return '<select id="'+domId+'">'+c.opts.map(function(o){return '<option'+(o===cur?' selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select>';
      if(c.src){var list=M[c.src]||[];
        if(c.activeOnly) list=list.filter(function(x){return x.Status===undefined||x.Status==='active';});
        return '<select id="'+domId+'">'+(addMode?'<option value="">'+esc(c.f)+'…</option>':'')+list.map(function(x){
          var v=x[c.val];var lbl=c.label?x[c.label]:v;return '<option value="'+esc(v)+'"'+(String(v)===String(cur)?' selected':'')+'>'+esc(lbl)+'</option>';}).join('')+'</select>';}
      return '<input id="'+domId+'" value="'+esc(cur||'')+'"'+(addMode?' placeholder="'+esc(c.f)+'"':'')+'>';
    }
    function renderConfig(secKey){
      if(secKey==='group'){renderGroups();return;}   /* merged Groups + Members screen */
      var s=sec_(secKey); if(!s)return;
      /* default order: sort by columns left-to-right (following the header) */
      var rows=(M[s.data]||[]).slice().sort(function(a,b){
        for(var k=0;k<s.cols.length;k++){var c=s.cols[k];
          var va=String(resolveCell(secKey,c.f,a[c.f])==null?'':resolveCell(secKey,c.f,a[c.f]));
          var vb=String(resolveCell(secKey,c.f,b[c.f])==null?'':resolveCell(secKey,c.f,b[c.f]));
          var na=parseFloat(va.replace(/[^0-9.\-]/g,'')), nb=parseFloat(vb.replace(/[^0-9.\-]/g,''));
          var num=va!==''&&vb!==''&&!isNaN(na)&&!isNaN(nb)&&/^[\s\d.\-]+$/.test(va)&&/^[\s\d.\-]+$/.test(vb);
          var cmp=num?(na-nb):va.localeCompare(vb,'th');
          if(cmp)return cmp;
        }
        return 0;
      });
      var head='<tr>'+s.cols.map(function(c){return '<th>'+c.f+'</th>';}).join('')+'<th></th></tr>';
      var body=rows.map(function(r,ri){
        var idv=s.idField?r[s.idField]:'';
        var cells=s.cols.map(function(c){
          if(c.id) return '<td><span style="color:var(--muted)">🔒 '+esc(r[c.f])+'</span></td>';
          if(s.addonly) return '<td>'+esc(resolveCell(s.key,c.f,r[c.f]))+'</td>';
          return '<td>'+fieldHtml('e_'+secKey+'_'+esc(idv)+'_'+c.f,c,r[c.f],false)+'</td>';
        }).join('');
        var tail;
        if(s.addonly){
          var match={}; s.cols.forEach(function(c){match[c.f]=r[c.f];});
          var enc=encodeURIComponent(JSON.stringify(match));
          var mv='';
          if(s.move){
            var mc=MOVE[secKey]; var selId='mv_'+secKey+'_'+ri;
            var optsM=(M[mc.src]||[]).map(function(x){return '<option value="'+esc(x[mc.val])+'"'+(x[mc.val]===r[mc.change]?' disabled':'')+'>'+esc(x[mc.label])+'</option>';}).join('');
            mv='<select id="'+selId+'" style="width:auto;display:inline-block;margin-right:6px"><option value="">'+mc.ph+'</option>'+optsM+'</select>'+
               '<button class="btn sm" onclick="moveRow(\''+secKey+'\',\''+esc(r[mc.fixed])+'\',\''+esc(r[mc.change])+'\',\''+selId+'\')">Move</button> ';
          }
          tail='<td style="white-space:nowrap">'+mv+'<button class="btn sm rv" onclick="revokeRow(\''+secKey+'\',\''+enc+'\')">Revoke</button></td>';
        } else {
          tail='<td><button class="btn sm" onclick="saveRow(\''+secKey+'\',\''+esc(idv)+'\')">Save</button></td>';
        }
        return '<tr>'+cells+tail+'</tr>';
      }).join('');
      var inputs=s.cols.map(function(c){return fieldHtml('add_'+secKey+'_'+c.f,c,'',true);}).join('');
      var addcard=s.noadd?'':'<div class="card addcard"><div class="cardh">Add new</div><div class="addrow">'+inputs+'<button class="btn" onclick="addRow(\''+secKey+'\')">+ Add</button></div></div>';
      var hint=s.addonly?'Add new above · list below (filter &amp; sort)':'ID locked 🔒 · edit fields then Save';
      var listcard='<div class="card listcard"><div class="listh"><div class="cardh">List ('+rows.length+')</div>'+
        '<input class="filterbox" placeholder="🔎 Filter…" oninput="filterTable(this)"></div>'+
        '<div class="tablewrap"><table><thead>'+head+'</thead><tbody>'+(body||'')+'</tbody></table></div></div>';
      var note=s.note?'<div class="note">'+s.note+'</div>':'';
      $('main').innerHTML='<h2>'+esc(s.title)+'</h2><div class="sub">'+hint+'</div>'+note+
        addcard+listcard+
        ((secKey==='member'||secKey==='userrole')?restoreCard(secKey):'');
    }
    /* ---- Groups & Members: 1 person = 1 group. Group master table + flat assignment table ---- */
    function deptOptions(cur){return (M.depts||[]).map(function(d){return '<option value="'+esc(d.DeptID)+'"'+(String(d.DeptID)===String(cur)?' selected':'')+'>'+esc(d.DeptName)+'</option>';}).join('');}
    function renderGroups(){
      var canG=BOOT.canGrant, canC=BOOT.canConfig;
      var groups=(M.groups||[]).slice().sort(function(a,b){return String(a.GroupName||a.GroupID).localeCompare(String(b.GroupName||b.GroupID),'th');});
      /* current group(s) per employee — 1:1, but flag leftover duplicates so admin can resolve */
      var empG={}; (M.members||[]).forEach(function(m){(empG[m.EmpID]=empG[m.EmpID]||[]).push(m.GroupID);});
      var activeEmps=(M.employees||[]).filter(function(e){return e.Status==='active';})
        .sort(function(a,b){return String(a.FullName||'').localeCompare(String(b.FullName||''),'th');});
      /* ---- Groups master: create / rename / set owner dept ---- */
      var gmaster='';
      if(canC){
        var addG='<div class="card addcard"><div class="cardh">Add new group</div><div class="addrow">'+
          fieldHtml('add_group_GroupID',{f:'GroupID'},'',true)+
          fieldHtml('add_group_GroupName',{f:'GroupName'},'',true)+
          '<button class="btn" onclick="addRow(\'group\')">+ Add</button></div></div>';
        var grows=groups.map(function(g){var gid=g.GroupID;
          return '<tr><td><span style="color:var(--muted)">🔒 '+esc(gid)+'</span></td>'+
            '<td><input id="e_group_'+esc(gid)+'_GroupName" value="'+esc(g.GroupName||'')+'"></td>'+
            '<td><button class="btn sm" onclick="saveRow(\'group\',\''+esc(gid)+'\')">Save</button></td></tr>';
        }).join('');
        gmaster=addG+'<div class="card listcard"><div class="listh"><div class="cardh">Groups ('+groups.length+')</div></div>'+
          '<div class="tablewrap"><table><thead><tr><th>GroupID</th><th>GroupName</th><th></th></tr></thead><tbody>'+grows+'</tbody></table></div></div>';
      }
      /* ---- assignment: one row per active employee -> one group ---- */
      var arows=activeEmps.map(function(e){
        var gids=empG[e.EmpID]||[]; var cur=gids[0]||'';
        var dup=gids.length>1?' <span style="color:var(--amber);font-weight:600;font-size:11px">⚠ in '+gids.length+' groups</span> <button class="btn sm" onclick="setGroup(\''+esc(e.EmpID)+'\')">Keep selected</button>':'';
        var sel='<select id="ag_'+esc(e.EmpID)+'" onchange="setGroup(\''+esc(e.EmpID)+'\')"'+(canG?'':' disabled')+'>'+
          '<option value="">— none —</option>'+
          groups.map(function(g){return '<option value="'+esc(g.GroupID)+'"'+(String(g.GroupID)===String(cur)?' selected':'')+'>'+esc(g.GroupName)+'</option>';}).join('')+'</select>';
        return '<tr><td>'+esc(e.FullName)+'</td><td>'+sel+dup+'</td></tr>';
      }).join('');
      var assign='<div class="card listcard"><div class="listh"><div class="cardh">Member → Group ('+activeEmps.length+')</div>'+
        '<input class="filterbox" placeholder="🔎 Filter…" oninput="filterTable(this)"></div>'+
        '<div class="tablewrap"><table><thead><tr><th>Employee</th><th>Group</th></tr></thead><tbody>'+(arows||'<tr><td colspan="2" class="empty">No active employees</td></tr>')+'</tbody></table></div></div>';
      var note='<div class="note"><b>1 person = 1 group.</b> Pick each person’s group from the dropdown — it saves immediately and removes any previous group. Choose <i>— none —</i> to remove them from all groups.'+(canG?'':' <i>(assigning needs grant permission)</i>')+'</div>';
      $('main').innerHTML='<h2>Groups &amp; Members</h2><div class="sub">Manage groups, then assign one group per person</div>'+note+gmaster+assign;
    }
    function setGroup(emp){
      if(BUSY)return;
      var g=$('ag_'+emp)?$('ag_'+emp).value:'';
      busyOn('Saving…');
      api('cpAddRow',{table:'member',row:{GroupID:g,EmpID:emp}}).then(function(r){busyOff();
        if(!r.ok)alert(r.reason==='emp_inactive'?'Employee is not Active':(r.error||r.reason));
        M=null;loadConfig('group');});
    }
    /* live filter: hide rows whose combined cell text doesn't contain the query */
    function filterTable(inp){
      var q=inp.value.trim().toLowerCase();
      var card=inp.closest('.card'); if(!card)return; var table=card.querySelector('table');
      if(!table||!table.tBodies[0])return;
      Array.prototype.forEach.call(table.tBodies[0].rows,function(r){
        var txt=Array.prototype.map.call(r.cells,function(td){return cellVal(td);}).join(' ').toLowerCase();
        r.style.display=(!q||txt.indexOf(q)>-1)?'':'none';
      });
    }
    /* revoked rows of ACTIVE employees — surfaced so admin can restore */
    var RESTORE={
      member:{src:'revokedMembers',title:'Revoked — click Restore (active employees only)',btn:'Restore',confirm:'Restore this group membership?',noemp:'Employee is not Active'},
      userrole:{src:'revokedUserRoles',title:'Revoked roles — click Approve to restore (active employees only)',btn:'Approve',confirm:'Approve and restore this role for the employee?',noemp:'Employee is not Active'}
    };
    function restoreCard(secKey){
      var cfg=RESTORE[secKey]; if(!cfg)return '';
      var rev=M[cfg.src]||[]; if(!rev.length)return '';
      var s=sec_(secKey);
      var act={}; (M.employees||[]).forEach(function(e){if(e.Status==='active')act[e.EmpID]=1;});
      var rows=rev.filter(function(r){return act[r.EmpID];});   /* only active employees can be restored */
      if(!rows.length)return '';
      var headHtml=s.cols.map(function(c){return '<th>'+c.f+'</th>';}).join('')+'<th></th>';
      var bodyR=rows.map(function(r){
        var cells=s.cols.map(function(c){return '<td>'+esc(resolveCell(secKey,c.f,r[c.f]))+'</td>';}).join('');
        var args=s.cols.map(function(c){return '\''+esc(r[c.f])+'\'';}).join(',');
        return '<tr>'+cells+'<td><button class="btn sm green" onclick="restoreRow(\''+secKey+'\','+args+')">'+cfg.btn+'</button></td></tr>';
      }).join('');
      return '<div class="card"><h3>'+cfg.title+'</h3><table><thead><tr>'+headHtml+'</tr></thead><tbody>'+bodyR+'</tbody></table></div>';
    }
    function restoreRow(secKey){
      if(BUSY)return;var cfg=RESTORE[secKey];var s=sec_(secKey);
      var vals=Array.prototype.slice.call(arguments,1);
      var row={}; s.cols.forEach(function(c,i){row[c.f]=vals[i];});
      if(!confirm(cfg.confirm))return;
      busyOn('Restoring…');
      api('cpAddRow',{table:secKey,row:row}).then(function(r){busyOff();
        if(!r.ok){alert(r.reason==='emp_inactive'?cfg.noemp:(r.error||r.reason));return;}
        M=null;loadConfig(secKey==='member'?'group':secKey);});
    }
    function saveRow(secKey,idv){
      if(BUSY)return;var s=sec_(secKey);var patch={};
      s.cols.forEach(function(c){if(c.id)return;patch[c.f]=$('e_'+secKey+'_'+idv+'_'+c.f).value;});
      busyOn('Saving…');
      api('cpUpdateRow',{table:secKey,idField:s.idField,idValue:idv,patch:patch}).then(function(r){busyOff();if(!r.ok){alert(r.error||r.reason);return;}M=null;if(secKey==='emp')refreshBoot();loadConfig(secKey);});
    }
    function addRow(secKey){
      if(BUSY)return;var s=sec_(secKey);
      var row={}; s.cols.forEach(function(c){row[c.f]=$('add_'+secKey+'_'+c.f).value;});
      var firstKey=s.cols[0].f;
      if(!row[firstKey]){alert('First field required');return;}
      if((secKey==='userrole'||secKey==='roleperm')&&!confirm('Confirm this grant?'))return;
      busyOn('Adding…');
      api('cpAddRow',{table:secKey,row:row}).then(function(r){busyOff();if(!r.ok){alert(r.reason==='emp_inactive'?'Employee is not Active — cannot add/restore (set Active on the Employees page first)':(r.reason==='is_home_dept'?'This is already the home department (set in Employees) — pick a different one':(r.error||r.reason)));return;}M=null;loadConfig(secKey);});
    }
    function revokeRow(secKey,enc){
      if(BUSY)return;
      var match=JSON.parse(decodeURIComponent(enc));
      if(!confirm('Revoke this item? (history kept — can be re-added later)'))return;
      busyOn('Revoking…');
      api('cpRevoke',{table:secKey,match:match}).then(function(r){busyOff();
        if(!r.ok){alert(r.error||r.reason);return;}
        M=null;loadConfig(secKey);});
    }
    /* move a member to another group in one click: revoke old membership + add new (upsert reactivates) */
    /* Move = reassign in one click (revoke old + add new). fixed=key kept, change=key swapped. */
    var MOVE={
      member:{fixed:'EmpID',change:'GroupID',src:'groups',val:'GroupID',label:'GroupName',ph:'Move to…'},
      userrole:{fixed:'EmpID',change:'RoleID',src:'roles',val:'RoleID',label:'RoleName',ph:'New role…'}
    };
    function moveRow(secKey,fixedVal,fromVal,selId){
      if(BUSY)return;var mc=MOVE[secKey];
      var toVal=$(selId)?$(selId).value:'';
      if(!toVal){alert('Select a target first');return;}
      if(toVal===fromVal){alert('Target must differ from the current one');return;}
      if(!confirm('Move '+fixedVal+'?'))return;
      busyOn('Moving…');
      /* clean reassign in one call: removes the old link, sets the target active (no revoked leftover) */
      api('cpMove',{table:secKey,fixedField:mc.fixed,changeField:mc.change,fixedVal:fixedVal,fromVal:fromVal,toVal:toVal}).then(function(r){busyOff();
        if(!r.ok){alert(r.reason==='emp_inactive'?'Employee is not Active':(r.error||r.reason));return;}
        M=null;loadConfig(secKey==='member'?'group':secKey);});
    }
    /* ---- sortable table headers: click any column to sort, click again to reverse ---- */
    function cellVal(td){if(!td)return '';var inp=td.querySelector('input,select');if(inp){if(inp.tagName==='SELECT'){var o=inp.options[inp.selectedIndex];return o?o.text:inp.value;}return inp.value;}return (td.innerText||td.textContent||'').trim();}
    document.addEventListener('click',function(e){
      var th=e.target.closest?e.target.closest('th'):null; if(!th)return;
      var table=th.closest('table'); if(!table)return;
      var hr=th.parentNode, ths=Array.prototype.slice.call(hr.children), idx=ths.indexOf(th);
      var tb=table.tBodies[0]; if(!tb||idx<0)return;
      var rows=Array.prototype.slice.call(tb.rows); if(rows.length<2)return;
      var asc=!(table._sc===idx&&table._sd==='asc'); table._sc=idx; table._sd=asc?'asc':'desc';
      rows.sort(function(a,b){var x=cellVal(a.cells[idx]),y=cellVal(b.cells[idx]);
        var nx=parseFloat(x.replace(/[^0-9.\-]/g,'')),ny=parseFloat(y.replace(/[^0-9.\-]/g,''));
        var num=x!==''&&y!==''&&!isNaN(nx)&&!isNaN(ny); var r=num?(nx-ny):x.localeCompare(y,'th');
        return asc?r:-r;});
      rows.forEach(function(r){tb.appendChild(r);});
      ths.forEach(function(h){var s=h.querySelector('.so');if(s)s.remove();});
      var ind=document.createElement('span');ind.className='so';ind.textContent=asc?' ▲':' ▼';th.appendChild(ind);
    });
    boot();
  </script>
