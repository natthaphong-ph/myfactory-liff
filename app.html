<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>My Factory (Supabase)</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="fonts/plex-thai.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root{--navy:#0F172A;--teal:#0D9488;--amber:#D97706;--snow:#FAFAFA;--charcoal:#1E293B;
      --surface:#F1F5F9;--border:#E5E7EB;--red:#EF4444;--green:#10B981;--muted:#64748B;
      --pico-font-family:"IBM Plex Sans Thai",system-ui,sans-serif;--pico-primary:#0D9488;
      --pico-primary-background:#0D9488;--pico-primary-hover-background:#0b7a70;--pico-border-radius:10px;}
    *{box-sizing:border-box}
    input,select,textarea,button{margin-bottom:0;--pico-line-height:1.4}
    input,select,textarea{color:var(--charcoal)!important;--pico-form-element-color:var(--charcoal);font-weight:500}
    input::placeholder,textarea::placeholder{color:#94A3B8!important;font-weight:400}
    body{margin:0;font-family:"IBM Plex Sans Thai",sans-serif;background:var(--snow);color:var(--charcoal)}
    .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    header.bar{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex:none}
    header.bar h1{font-size:16px;margin:0;font-weight:600;flex:1;color:#fff}
    header.bar .who{font-size:11px;color:#cbd5e1}
    main.wrap{flex:1;padding:16px}
    .tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .tile{display:flex;flex-direction:column;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px 10px;text-align:center;cursor:pointer;color:var(--navy);font-weight:600;font-size:13px}
    .tile .ic{font-size:28px;color:var(--teal)}
    .tile.soon{opacity:.5;cursor:default}.tile.soon .ic{color:var(--muted)}
    .hello{font-size:14px;color:var(--muted);margin-bottom:14px}.hello b{color:var(--navy)}
    .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
    .inp{width:100%;padding:11px;font-size:15px;border:1px solid var(--border);border-radius:9px;background:#fff}
    .btn{width:100%;margin-top:14px;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;color:#fff;background:var(--teal)}
    .btn:disabled{opacity:.5}
    .err{color:var(--red);font-size:13px;margin-top:8px;text-align:center}
    .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px}
    .warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;border-radius:10px;padding:10px;font-size:13px;margin-bottom:12px}
    .state{text-align:center;padding:30px 10px}.state .ic{font-size:42px}.state h2{font-size:18px;color:var(--navy);margin:12px 0 6px}.state p{font-size:14px;color:var(--muted);margin:0}
    .spin{display:flex;justify-content:center;padding:34px}
    .sbtag{position:fixed;left:8px;bottom:8px;background:#0F766E;color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;z-index:9;opacity:.85}
  </style>
</head>
<body>
  <div class="app">
    <header class="bar"><h1 id="title">My Factory</h1><span class="who" id="who"></span></header>
    <main class="wrap" id="body"><div class="spin" aria-busy="true">Connecting…</div></main>
  </div>

  <script>
  /* ===================== CONFIG (Supabase backend) ===================== */
  var LIFF_ID='2010250488-MyQiwlFp';
  var FN_URL='https://jmedgllujclrhpjdrfcu.supabase.co/functions/v1/line-auth';
  var PUBKEY='sb_publishable_0YCGBZ5wt_dTpDB-TlLpiQ_aGMctwXZ';
  /* ==================================================================== */

  var idToken=null, ACCESS=null;
  var body=document.getElementById('body'), titleEl=document.getElementById('title'), whoEl=document.getElementById('who');

  function api(action,extra){return fetch(FN_URL,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+PUBKEY,'apikey':PUBKEY},
    body:JSON.stringify(Object.assign({action:action,idToken:idToken},extra||{}))}).then(function(r){return r.json();});}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  /* localStorage SWR cache (shared origin with sub-pages) */
  var LC='mfcsb_';
  function lcGet(k,ttl){try{var o=JSON.parse(localStorage.getItem(LC+k)||'null');if(o&&(Date.now()-o.t)<ttl*1000)return o.d;}catch(e){}return null;}
  function lcPut(k,d){try{localStorage.setItem(LC+k,JSON.stringify({t:Date.now(),d:d}));}catch(e){}}
  function lcDel(k){try{localStorage.removeItem(LC+k);}catch(e){}}
  function lcClear(){try{Object.keys(localStorage).forEach(function(k){if(k.indexOf(LC)===0)localStorage.removeItem(k);});}catch(e){}}

  /* ===================== BOOT ===================== */
  function boot(){
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){liff.login();return;}
      idToken=liff.getIDToken();
      var cached=lcGet('access',120);
      if(cached) applyAccess(cached,true);
      return api('boot').then(function(res){
        if(res&&(res.code||res.error)&&/expired|IdToken|verify failed/i.test(res.code||res.error)){reauth();return;}
        sessionStorage.removeItem('reauth');
        if(!res||!res.ok){if(!cached)body.innerHTML='<div class="empty">'+esc((res&&res.error)||'No access')+'</div>';return;}
        lcPut('access',res); applyAccess(res);
      });
    }).catch(function(e){body.innerHTML='<div class="empty">LINE error: '+esc(e)+'</div>';});
  }
  function reauth(){lcClear();if(sessionStorage.getItem('reauth')){body.innerHTML='<div class="state"><div class="ic">⚠️</div><h2>เซสชันหมดอายุ</h2><p>ปิดแล้วเปิดใหม่</p></div>';return;}
    sessionStorage.setItem('reauth','1');try{liff.logout();}catch(e){}liff.login();}

  function applyAccess(res,fromCache){
    var d = (res.state==='active') ? Object.assign({state:'active'}, res.profile||{})
                                   : {state:res.state, displayName:res.lineName||'', lineName:res.lineName||''};
    ACCESS=d;
    if(d.state==='active'){ whoEl.textContent=esc(d.empName||d.displayName||''); renderHome(); }
    else { whoEl.textContent='';
      if(d.state==='not_registered'||d.state==='reverify_required') renderRegister(d, d.state==='reverify_required');
      else if(d.state==='pending') stateMsg('⏳','รออนุมัติ','ส่งคำขอแล้ว รอผู้ดูแลอนุมัติ');
      else if(d.state==='revoked') stateMsg('⛔','สิทธิถูกถอน','ติดต่อผู้ดูแลระบบ');
      else if(d.state==='denied_inactive') stateMsg('⛔','บัญชีถูกปิดการใช้งาน','ข้อมูลพนักงานถูกตั้งเป็น inactive — ติดต่อ HR/ผู้ดูแลระบบ');
      else stateMsg('⛔','เข้าถึงไม่ได้',esc(d.state||''));
    }
  }
  function stateMsg(ic,h,p){body.innerHTML='<div class="state"><div class="ic">'+ic+'</div><h2>'+esc(h)+'</h2><p>'+p+'</p></div>';}

  /* ===================== HOME (launcher — every app is a separate page) ===================== */
  var APP_ICON={APP_GENBA:'▤',APP_KYC:'▣',APP_ADMIN:'⚙',APP_TPMTAG:'⬡',APP_CHECKIN:'◷',APP_MACHK:'▦'};
  function renderHome(){
    titleEl.textContent='My Factory';
    var apps=ACCESS.apps||[];
    var tiles=apps.map(function(a){
      var ic=APP_ICON[a.appId]||'▣';
      var ready=a.url && a.url!=='set-after-deploy';
      var cls='tile'+(ready?'':' soon');
      return '<div class="'+cls+'"'+(ready?(' onclick="openApp(\''+esc(a.url)+'\')"'):'')+'>'+
        '<div class="ic">'+ic+'</div><div>'+esc(a.appName)+'</div>'+
        (ready?'':'<div style="font-size:9px;color:var(--muted)">เร็ว ๆ นี้</div>')+'</div>';
    }).join('');
    body.innerHTML='<div class="hello">ยินดีต้อนรับ <b>'+esc(ACCESS.empName||ACCESS.displayName)+'</b>'+(ACCESS.dept?(' · '+esc(ACCESS.dept)):'')+'</div>'+
      '<div class="tiles">'+(tiles||'<div class="empty">ยังไม่ได้รับสิทธิแอปใด</div>')+'</div>';
  }
  /* navigate to the app's page (uses filename from apps.url, same folder) */
  function openApp(url){ var f=String(url||'').replace(/[#?].*$/,'').split('/').pop(); location.href=f||url; }

  /* ===================== REGISTER (KYC gate) ===================== */
  function renderRegister(d,reverify){
    titleEl.textContent='My Factory';
    body.innerHTML='<div class="card"><div class="state" style="padding:6px 0 14px"><div class="ic">🪪</div><h2>'+(reverify?'ยืนยันตัวตนอีกครั้ง':'ลงทะเบียน (KYC)')+'</h2><p>สวัสดี '+esc(d.displayName)+' กรอกรหัสพนักงานเพื่อ'+(reverify?'ยืนยันใหม่':'ขอสิทธิ')+'</p></div>'+
      '<label>รหัสพนักงาน</label><input class="inp" id="emp" placeholder="เช่น E0001" autocapitalize="characters">'+
      '<button class="btn" id="go" onclick="submitKyc()">ส่งเพื่อขออนุมัติ</button><div class="err" id="err"></div></div>';
  }
  function submitKyc(){var emp=document.getElementById('emp').value.trim();var err=document.getElementById('err');
    if(!emp){err.textContent='กรุณากรอกรหัสพนักงาน';return;}var b=document.getElementById('go');b.disabled=true;b.textContent='กำลังส่ง…';
    api('submitKyc',{empId:emp}).then(function(r){if(r.ok&&r.data&&r.data.ok){lcDel('access');stateMsg('⏳','รออนุมัติ','ส่งคำขอแล้ว รอผู้ดูแลอนุมัติ');}
      else{b.disabled=false;b.textContent='ส่งเพื่อขออนุมัติ';err.textContent=(r.data&&r.data.reason==='emp_not_found')?'ไม่พบรหัสพนักงาน':((r.data&&r.data.reason)||r.error||'error');}});}

  boot();
  </script>
</body>
</html>
