<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>My Factory</title>
  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Pico CSS (classless base) + self-hosted IBM Plex Sans Thai subset (no icon font) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="fonts/plex-thai.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    /* ---- Brand theming: map Pico's variables to My Factory palette ---- */
    :root{
      --pico-font-family:"IBM Plex Sans Thai",system-ui,-apple-system,sans-serif;
      --pico-primary:#0D9488;            /* teal */
      --pico-primary-background:#0D9488;
      --pico-primary-hover-background:#0b7a70;
      --pico-primary-focus:rgba(13,148,136,.25);
      --pico-border-radius:12px;
      --pico-spacing:1rem;
      --navy:#0F172A; --teal:#0D9488; --muted:#64748B; --border:#E5E7EB;
      --snow:#FAFAFA; --red:#EF4444;
    }
    body{background:var(--snow)}
    .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    /* navy header band */
    header.bar{background:var(--navy);color:#fff;padding:18px 16px;text-align:center}
    header.bar h1{font-size:18px;margin:0;font-weight:600;color:#fff}
    header.bar p{margin:4px 0 0;font-size:12px;color:#cbd5e1}
    main.wrap{flex:1;padding:18px}
    /* cards = Pico <article>, tighten margins */
    article{margin:0 0 14px;padding:18px}
    .state{text-align:center;padding:20px 8px}
    .state .ic{font-size:42px;line-height:1}
    .state h2{font-size:18px;margin:12px 0 6px;color:var(--navy)}
    .state p{font-size:14px;color:var(--muted);margin:0}
    .hello{font-size:14px;margin:2px 0 14px}
    .hello b{color:var(--navy)}
    /* app tiles */
    .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
      background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 12px;
      text-decoration:none;color:var(--navy);font-weight:600;font-size:13px;
      transition:transform .08s ease,box-shadow .12s ease}
    .tile:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,.08)}
    .tile .ic{font-size:28px;color:var(--teal)}
    .err{color:var(--red);font-size:13px;margin-top:8px;text-align:center}
    .spin{display:flex;justify-content:center;padding:28px}
    /* shrink Pico's default input/button footprint a touch for mobile */
    input,select,textarea{margin-bottom:0;color:#1E293B!important;--pico-form-element-color:#1E293B;font-weight:500}
    input::placeholder,textarea::placeholder{color:#94A3B8!important;font-weight:400}
    label{font-size:13px;color:var(--muted);margin-bottom:6px}
  </style>
</head>
<body>
  <div class="app">
    <header class="bar">
      <h1>My Factory</h1>
      <p>Production Super App</p>
    </header>
    <main class="wrap" id="main">
      <div class="spin" aria-busy="true">Connecting to LINE…</div>
    </main>
  </div>

  <script>
    /* ====== CONFIG — already filled for My Factory ====== */
    var LIFF_ID   = '2010250488-MyQiwlFp';
    var API_URL   = 'https://script.google.com/macros/s/AKfycbyRJP-fDdUKFkAd5LmdBUXVM6wAb83i2leOueJ-d1Uw_czlnujTq-csD2WGGkkxcNWE/exec';
    /* ===================================================== */

    var idToken = null;
    var main = document.getElementById('main');
    function show(html){ main.innerHTML = html; }

    /** POST to GAS as text/plain to avoid a CORS preflight (GAS has no OPTIONS). */
    function api(action, extra){
      var body = Object.assign({ action: action, idToken: idToken }, extra || {});
      return fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(body)
      }).then(function(r){ return r.json(); });
    }

    function boot(){
      liff.init({ liffId: LIFF_ID }).then(function(){
        if(!liff.isLoggedIn()){ liff.login(); return; }
        idToken = liff.getIDToken();
        return api('checkAccess').then(handleAccess);
      }).catch(function(e){
        show('<article class="state"><div class="ic">⚠️</div><h2>LINE error</h2><p>'+esc(e)+'</p></article>');
      });
    }

    function reauth(){
      if(sessionStorage.getItem('reauth')){
        show('<article class="state"><div class="ic">⚠️</div><h2>เซสชันหมดอายุ</h2><p>กรุณาปิดแล้วเปิดหน้านี้ใหม่</p></article>');
        return;
      }
      sessionStorage.setItem('reauth','1');
      try{ liff.logout(); }catch(e){}
      liff.login();
    }
    function handleAccess(res){
      if(res && (res.code||res.error) && /expired|IdToken|verify failed/i.test(res.code||res.error)){ reauth(); return; }
      if(!res || !res.ok){
        show('<article class="state"><div class="ic">⚠️</div><h2>เกิดข้อผิดพลาด</h2><p>'+esc((res&&res.error)||'unknown')+'</p></article>');
        return;
      }
      sessionStorage.removeItem('reauth');
      var d = res.data;
      switch(d.state){
        case 'active':            renderHome(d); break;
        case 'not_registered':    renderRegister(d, false); break;
        case 'reverify_required': renderRegister(d, true); break;
        case 'pending':           renderPending(); break;
        case 'revoked':           renderBlocked('สิทธิถูกถอน','ติดต่อผู้ดูแลระบบ'); break;
        case 'denied_inactive':   renderBlocked('บัญชีถูกปิด','ข้อมูลพนักงานถูกปิดการใช้งาน ติดต่อ HR/Admin'); break;
        default:                  renderBlocked('ปฏิเสธการเข้าถึง', d.state);
      }
    }

    function renderRegister(d, reverify){
      show(
        '<article>'+
          '<div class="state" style="padding:6px 0 16px"><div class="ic">🪪</div>'+
          '<h2>'+(reverify?'ยืนยันตัวตนอีกครั้ง':'ลงทะเบียน (KYC)')+'</h2>'+
          '<p>สวัสดี '+esc(d.displayName)+' กรอกรหัสพนักงานเพื่อ'+(reverify?'ยืนยันใหม่':'ขอสิทธิ')+'</p></div>'+
          '<label for="emp">รหัสพนักงาน (Employee ID)</label>'+
          '<input id="emp" placeholder="เช่น E0001" autocapitalize="characters">'+
          '<button id="go" style="margin-top:14px">ส่งเพื่อขออนุมัติ</button>'+
          '<div class="err" id="err"></div>'+
        '</article>'
      );
      document.getElementById('go').onclick = function(){
        var emp = document.getElementById('emp').value.trim();
        if(!emp){ document.getElementById('err').textContent='กรุณากรอกรหัสพนักงาน'; return; }
        this.setAttribute('aria-busy','true'); this.textContent='กำลังส่ง…';
        var btn=this;
        api('submitKyc', { empId: emp }).then(function(r){
          if(r.ok && r.data && r.data.ok){ renderPending(); }
          else {
            btn.removeAttribute('aria-busy'); btn.textContent='ส่งเพื่อขออนุมัติ';
            var reason = (r.data && r.data.reason) || r.error || 'failed';
            document.getElementById('err').textContent = reasonMsg(reason);
          }
        });
      };
    }

    function reasonMsg(r){
      if(r==='emp_not_found') return 'ไม่พบรหัสพนักงานนี้ ตรวจสอบกับ Admin/HR';
      if(r==='emp_inactive')  return 'รหัสพนักงานนี้ถูกปิดการใช้งาน';
      return 'ข้อผิดพลาด: '+r;
    }

    function renderPending(){
      show('<article class="state"><div class="ic">⏳</div><h2>รออนุมัติ</h2>'+
           '<p>ส่งคำขอให้ผู้ดูแลแล้ว คุณจะได้รับสิทธิเมื่อได้รับการอนุมัติ</p></article>');
    }

    function renderBlocked(title, sub){
      show('<article class="state"><div class="ic">⛔</div><h2>'+esc(title)+'</h2><p>'+esc(sub)+'</p></article>');
    }

    /* Inline SVG icons (24x24, stroke style) — zero font download */
    var SVG_ICONS = {
      APP_KYC:    '<path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 10a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM15 8h2M15 12h2M7 16c.7-1.5 2.2-2 4-2s3.3.5 4 2"/>',
      APP_GENBA:  '<path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2zM9 14l2 2 4-4"/>',
      APP_ADMIN:  '<path d="M10.3 4.3a1.7 1.7 0 0 1 3.4 0 1.7 1.7 0 0 0 2.6 1.1 1.7 1.7 0 0 1 2.3 2.3 1.7 1.7 0 0 0 1.1 2.6 1.7 1.7 0 0 1 0 3.4 1.7 1.7 0 0 0-1.1 2.6 1.7 1.7 0 0 1-2.3 2.3 1.7 1.7 0 0 0-2.6 1.1 1.7 1.7 0 0 1-3.4 0 1.7 1.7 0 0 0-2.6-1.1 1.7 1.7 0 0 1-2.3-2.3 1.7 1.7 0 0 0-1.1-2.6 1.7 1.7 0 0 1 0-3.4 1.7 1.7 0 0 0 1.1-2.6 1.7 1.7 0 0 1 2.3-2.3 1.7 1.7 0 0 0 2.6-1.1zM9 12a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/>',
      APP_CHECKIN:'<path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0zM12 7v5l3 3"/>',
      DEFAULT:    '<path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/>'
    };
    function appIcon(a){
      var p = SVG_ICONS[a.appId] || SVG_ICONS.DEFAULT;
      return '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';
    }
    function renderHome(d){
      var apps = d.apps || [];
      var tiles = apps.length ? apps.map(function(a){
        var href = (a.url && a.url.indexOf('http')===0) ? a.url : '#';
        return '<a class="tile" href="'+href+'"><span class="ic">'+appIcon(a)+'</span><span>'+esc(a.appName)+'</span></a>';
      }).join('') : '<p style="color:var(--muted);font-size:13px">ยังไม่ได้รับสิทธิแอปใด</p>';
      show(
        '<div class="hello">ยินดีต้อนรับ <b>'+esc(d.empName||d.displayName)+'</b>'+(d.dept?(' · '+esc(d.dept)):'')+'</div>'+
        '<div class="tiles">'+tiles+'</div>'
      );
    }

    function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

    boot();
  </script>
</body>
</html>
