<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Genba & 5S Walk</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Self-hosted image compressor (vendored in repo; no CDN dependency). Global: imageCompression -->
  <script src="browser-image-compression.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <style>
    :root{--navy:#0F172A;--teal:#0D9488;--amber:#D97706;--snow:#FAFAFA;--charcoal:#1E293B;
      --surface:#F1F5F9;--border:#E5E7EB;--red:#EF4444;--green:#10B981;--muted:#64748B;
      --pico-font-family:"IBM Plex Sans Thai",system-ui,sans-serif;--pico-primary:#0D9488;
      --pico-primary-background:#0D9488;--pico-primary-hover-background:#0b7a70;--pico-border-radius:10px;}
    *{box-sizing:border-box}
    /* keep our compact custom controls — neutralise Pico's default form spacing */
    input,select,textarea,button{margin-bottom:0;--pico-line-height:1.4}
    body{margin:0;font-family:"IBM Plex Sans Thai",sans-serif;background:var(--snow);color:var(--charcoal)}
    .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    header{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
    header .bk{cursor:pointer;font-size:18px;width:22px}
    header h1{font-size:16px;margin:0;font-weight:600;flex:1}
    main{flex:1;padding:14px}
    .tabs{display:flex;gap:6px;margin-bottom:12px}
    .frow{display:flex;gap:8px;margin-bottom:8px}
    .frow select{flex:1;min-width:0;font-size:14px;padding:9px}
    .tab{flex:1;text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer}
    .tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
    .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;gap:10px;cursor:pointer}
    .card img{width:64px;height:64px;object-fit:cover;border-radius:8px;background:var(--surface);flex:none}
    .card .ph{width:64px;height:64px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;flex:none}
    .card .meta{flex:1;min-width:0}
    .card .ttl{font-size:14px;font-weight:600;color:var(--navy)}
    .card .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .badge{display:inline-block;padding:1px 8px;border-radius:999px;font-size:11px;font-weight:600;margin-top:4px}
    .s-Open{background:#FEF2F2;color:var(--red)} .s-InProgress{background:#FFFBEB;color:var(--amber)}
    .s-Done{background:#EFF6FF;color:#2563EB} .s-Closed{background:#ECFDF5;color:var(--green)}
    label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
    input,select,textarea{width:100%;padding:11px;font-size:15px;border:1px solid var(--border);border-radius:9px;outline:none;background:#fff;
      color:var(--charcoal)!important;--pico-form-element-color:var(--charcoal);font-weight:500}
    select,option{color:var(--charcoal)!important}
    input::placeholder,textarea::placeholder{color:#94A3B8!important;font-weight:400}
    textarea{min-height:74px;resize:vertical}
    .btn{width:100%;margin-top:16px;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;color:#fff;background:var(--teal)}
    .btn:disabled{opacity:.5}
    .btn.sec{background:#fff;color:var(--teal);border:1px solid var(--teal)}
    .btn.amber{background:var(--amber)} .btn.green{background:var(--green)}
    .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--teal);color:#fff;border:none;border-radius:999px;padding:14px 26px;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.22);cursor:pointer;z-index:6}
    .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .thumb{position:relative;width:70px;height:70px}
    .thumb img{width:70px;height:70px;object-fit:cover;border-radius:8px}
    .thumb .x{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;line-height:20px;text-align:center;font-size:12px;cursor:pointer}
    .add-photo{width:70px;height:70px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:26px;cursor:pointer}
    .gallery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}
    .gallery img{width:100%;height:90px;object-fit:cover;border-radius:8px}
    .sec-title{font-size:13px;font-weight:700;color:var(--navy);margin:14px 0 4px}
    .row{font-size:14px;margin:6px 0}.row b{color:var(--navy)}
    .err{color:var(--red);font-size:13px;margin-top:8px;text-align:center}
    .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px}
    .spinner{border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;width:34px;height:34px;animation:spin 1s linear infinite;margin:24px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="app">
    <header><span class="bk" id="back" onclick="goBack()"><i class="ti ti-chevron-left"></i></span><h1 id="title">Genba & 5S Walk</h1></header>
    <main id="main"><div class="spinner"></div></main>
  </div>
  <button class="fab hidden" id="fab" onclick="showForm()"><i class="ti ti-plus" style="vertical-align:-2px"></i> New</button>

  <script>
    /* ===== CONFIG (same LIFF app + API as the super app) ===== */
    var LIFF_ID = '2010250488-MyQiwlFp';
    var API_URL = 'https://script.google.com/macros/s/AKfycbyRJP-fDdUKFkAd5LmdBUXVM6wAb83i2leOueJ-d1Uw_czlnujTq-csD2WGGkkxcNWE/exec';
    /* ======================================================== */

    var idToken=null, BOOT=null, scope='all', beforeFiles=[], main=document.getElementById('main');
    /* list pagination state */
    var LISTALL=[], SHOWN=0, PAGE=30, FILTERED=false, CURFILTER=null;

    function api(action, extra){
      return fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify(Object.assign({action:action,idToken:idToken},extra||{}))}).then(function(r){return r.json();});
    }
    /* localStorage cache (stale-while-revalidate) — instant open even across sessions.
       Namespaced + TTL; cleared on logout/reauth so no previous user's data lingers. */
    var LC='mfc_';
    function lcGet(key,ttlSec){try{var o=JSON.parse(localStorage.getItem(LC+key)||'null');
      if(o&&(Date.now()-o.t)<ttlSec*1000)return o.d;}catch(e){}return null;}
    function lcPut(key,data){try{localStorage.setItem(LC+key,JSON.stringify({t:Date.now(),d:data}));}catch(e){}}
    function lcDel(key){try{localStorage.removeItem(LC+key);}catch(e){}}
    function lcClear(){try{Object.keys(localStorage).forEach(function(k){if(k.indexOf(LC)===0)localStorage.removeItem(k);});}catch(e){}}
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function show(h){main.innerHTML=h;}
    function setTitle(t){document.getElementById('title').textContent=t;}

    /* prevent double-submit: lock UI + show progress until a call finishes */
    var BUSY=false;
    function busyOn(msg){
      BUSY=true;
      var o=document.getElementById('busy');
      if(!o){o=document.createElement('div');o.id='busy';
        o.style.cssText='position:fixed;inset:0;background:rgba(250,250,250,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50';
        o.innerHTML='<div class="spinner"></div><div id="busymsg" style="margin-top:12px;color:#0F172A;font-size:14px;font-weight:600"></div>';
        document.body.appendChild(o);}
      document.getElementById('busymsg').textContent=msg||'Working…'; o.style.display='flex';
    }
    function busyOff(){ BUSY=false; var o=document.getElementById('busy'); if(o)o.style.display='none'; }

    /* file -> base64 (strip "data:...;base64," prefix) */
    function fileToB64(file){return new Promise(function(res,rej){
      var rd=new FileReader();rd.onloadend=function(){res(String(rd.result).split(',')[1]);};
      rd.onerror=rej;rd.readAsDataURL(file);});}

    /* Canvas fallback (zero-dependency) — used if the compressor lib didn't load */
    function resizeCanvas(file){return new Promise(function(res,rej){
      var rd=new FileReader();rd.onload=function(e){var img=new Image();
        img.onload=function(){var w=img.width,h=img.height,m=1280;
          if(w>h&&w>m){h=Math.round(h*m/w);w=m;}else if(h>m){w=Math.round(w*m/h);h=m;}
          var c=document.createElement('canvas');c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          res(c.toDataURL('image/jpeg',0.7).split(',')[1]);};
        img.onerror=rej;img.src=e.target.result;};
      rd.onerror=rej;rd.readAsDataURL(file);});}

    /* iOS (iPhone/iPad incl. iPadOS that reports as Mac) — Web Worker compression
       hangs inside the LINE/Safari webview, so run on the main thread there. */
    function isIOS(){
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
             (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
    }
    /* Guard against silent hangs: if a promise doesn't settle in ms, reject. */
    function withTimeout(p,ms){
      return Promise.race([p,new Promise(function(_,rej){setTimeout(function(){rej(new Error('compress timeout'));},ms);})]);
    }
    /* image resize -> base64 (no prefix)
       Primary: browser-image-compression (<=200KB cap, fixes EXIF rotation);
       Web Worker only on non-iOS. Any error OR 20s hang -> canvas fallback. */
    function resize(file){
      if(typeof imageCompression==='function'){
        return withTimeout(
            imageCompression(file,{maxSizeMB:0.2,maxWidthOrHeight:1280,useWebWorker:!isIOS()}),20000)
          .then(fileToB64)
          .catch(function(){return resizeCanvas(file);});   // lib error / timeout -> canvas
      }
      return resizeCanvas(file);
    }

    /* ---------- boot ---------- */
    function perfBadge(a,b){
      var d=document.createElement('div');
      d.style.cssText='position:fixed;left:8px;bottom:8px;background:#0F172A;color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;z-index:9;opacity:.9';
      d.textContent='liff.init '+a+'ms · call '+b+'ms';
      document.body.appendChild(d);
      setTimeout(function(){d.remove();},8000);
    }
    function boot(){
      var t0=Date.now(), tInit=0;
      liff.init({liffId:LIFF_ID}).then(function(){
        tInit=Date.now()-t0;
        if(!liff.isLoggedIn()){liff.login();return;}
        idToken=liff.getIDToken();
        // SWR: paint instantly from cache (persists across sessions), then revalidate
        var cached=lcGet('genbaInit',300);   // 5-min TTL
        if(cached&&cached.boot){ BOOT=cached.boot; buildAssigneeMap(); renderHome(cached.findings||[]); }
        var tf=Date.now();
        return api('genbaInit').then(function(r){   // filter options + assignees + All list
          var tFetch=Date.now()-tf;
          if(r&&(r.code||r.error)&&/expired|IdToken|verify failed/i.test(r.code||r.error)){ reauth(); return; }
          sessionStorage.removeItem('reauth');
          if(!r||!r.ok){ if(!cached) show('<div class="empty">'+esc((r&&r.error)||'No access to Genba')+'</div>'); return; }
          lcPut('genbaInit',{boot:r.boot,findings:r.findings});
          BOOT=r.boot; buildAssigneeMap();
          if(!FILTERED) renderHome(r.findings);   // refresh list only if user hasn't filtered meanwhile
          if(!cached) perfBadge(tInit,tFetch);
        });
      }).catch(function(e){show('<div class="empty">LINE error: '+esc(e)+'</div>');});
    }
    function reauth(){
      lcClear();   // drop cached data so the next login never shows a previous user's data
      if(sessionStorage.getItem('reauth')){show('<div class="empty">เซสชันหมดอายุ — ปิดแล้วเปิดใหม่</div>');return;}
      sessionStorage.setItem('reauth','1'); try{liff.logout();}catch(e){} liff.login();
    }

    /* ---------- home (filters) ---------- */
    var ASSIGNEE={};   // id -> {name,type}
    function buildAssigneeMap(){ ASSIGNEE={}; (BOOT.assignees||[]).forEach(function(a){ASSIGNEE[a.id]=a;}); }
    function assigneeLabel(id){ if(!id) return '—'; var a=ASSIGNEE[id]; return a? (a.type==='group'?'👥 ':'👤 ')+a.name : id; }

    function opts(arr,blank){ return '<option value="">'+(blank||'— All —')+'</option>'+arr.map(function(x){return '<option value="'+esc(x.id)+'">'+esc(x.name)+'</option>';}).join(''); }
    function renderHome(initial){
      setTitle('Genba & 5S Walk'); document.getElementById('back').style.visibility='hidden';
      document.getElementById('fab').classList.remove('hidden');
      var asg='<option value="">— All —</option>'+(BOOT.assignees||[]).map(function(a){return '<option value="'+esc(a.id)+'">'+(a.type==='group'?'👥 ':'👤 ')+esc(a.name)+'</option>';}).join('');
      var stOpts=(BOOT.statuses||['All']).map(function(s){return '<option value="'+esc(s)+'"'+(s==='Outstanding'?' selected':'')+'>'+esc(s)+'</option>';}).join('');
      show('<div class="card" style="display:block;padding:12px">'+
        '<div class="frow"><select id="fdept">'+opts(BOOT.departments||[])+'</select>'+
        '<select id="farea">'+opts(BOOT.areas||[])+'</select></div>'+
        '<div class="frow"><select id="fasg">'+asg+'</select>'+
        '<select id="fstatus">'+stOpts+'</select></div>'+
        '<button class="btn" style="margin-top:10px" onclick="applyFilter()">Show</button>'+
        '</div><div id="list"></div><div id="more"></div>');
      // default view: NOT-Closed only (pick "Closed"/"All" in the dropdown to see closed ones)
      FILTERED=false; SHOWN=0;
      LISTALL=(initial||[]).filter(function(f){return f.status!=='Closed';});
      document.getElementById('list').innerHTML='';
      if(!LISTALL.length){document.getElementById('list').innerHTML='<div class="empty">No findings.</div>';return;}
      renderMore();
    }
    function applyFilter(){
      if(BUSY)return; busyOn('Loading…');
      CURFILTER={dept:val('fdept'),area:val('farea'),assigned:val('fasg'),status:val('fstatus')};
      FILTERED=true; SHOWN=0;
      var el=document.getElementById('list'); if(el)el.innerHTML='';
      api('genbaFilter',{filter:Object.assign({},CURFILTER,{offset:0,limit:PAGE})}).then(function(r){
        busyOff();
        if(!r.ok){el.innerHTML='<div class="empty">'+esc(r.error||'error')+'</div>';return;}
        if(!r.findings.length){el.innerHTML='<div class="empty">No findings.</div>';document.getElementById('more').innerHTML='';return;}
        el.insertAdjacentHTML('beforeend',r.findings.map(card).join(''));
        SHOWN=r.findings.length; setMore(r.hasMore);
      });
    }
    function renderMore(){
      // client-side slice of LISTALL (default unfiltered view)
      var el=document.getElementById('list'); if(!el)return;
      var next=LISTALL.slice(SHOWN,SHOWN+PAGE);
      el.insertAdjacentHTML('beforeend',next.map(card).join(''));
      SHOWN+=next.length; setMore(SHOWN<LISTALL.length);
    }
    function loadMore(){
      if(BUSY)return;
      if(!FILTERED){ renderMore(); return; }
      busyOn('Loading…');
      api('genbaFilter',{filter:Object.assign({},CURFILTER,{offset:SHOWN,limit:PAGE})}).then(function(r){
        busyOff(); if(!r.ok)return;
        document.getElementById('list').insertAdjacentHTML('beforeend',r.findings.map(card).join(''));
        SHOWN+=r.findings.length; setMore(r.hasMore);
      });
    }
    function setMore(has){
      var m=document.getElementById('more'); if(!m)return;
      m.innerHTML=has?'<button class="btn sec" style="margin-top:4px" onclick="loadMore()">Load more</button>':'';
    }
    function renderList(){ lcDel('genbaInit'); renderHome([]); applyFilter(); }   // refresh after actions
    function thumb(url,w){ return url ? url.replace('/uc?id=','/thumbnail?id=')+'&sz=w'+(w||200) : ''; }
    function card(f){
      var img=f.cover?'<img src="'+esc(thumb(f.cover,200))+'" referrerpolicy="no-referrer" loading="lazy">':'<div class="ph">no photo</div>';
      var st=f.status.replace(/\s/g,'');
      return '<div class="card" onclick="openFinding(\''+f.findingId+'\')">'+img+
        '<div class="meta"><div class="ttl">'+esc(f.areaName)+'</div>'+
        '<div class="sub">'+esc(f.categoryName)+' · '+esc(f.severity)+' · '+esc(f.date)+'</div>'+
        '<div class="sub">→ '+esc(assigneeLabel(f.ownerEmpId))+'</div>'+
        '<span class="badge s-'+st+'">'+esc(f.status)+'</span></div></div>';
    }

    /* ---------- new finding form ---------- */
    function showForm(){
      beforeFiles=[]; document.getElementById('fab').classList.add('hidden');
      document.getElementById('back').style.visibility='visible'; setTitle('New Finding');
      var opt=function(arr){return arr.map(function(x){return '<option value="'+esc(x.id)+'">'+esc(x.name)+'</option>';}).join('');};
      var asg='<option value="">— none —</option>'+(BOOT.assignees||[]).map(function(a){return '<option value="'+esc(a.id)+'">'+(a.type==='group'?'👥 ':'👤 ')+esc(a.name)+'</option>';}).join('');
      show('<div class="card" style="display:block">'+
        '<label>Area</label><select id="area">'+opt(BOOT.areas)+'</select>'+
        '<label>5S / Safety category</label><select id="cat">'+opt(BOOT.categories)+'</select>'+
        '<label>Severity</label><select id="sev"><option>Low</option><option>Medium</option><option>High</option></select>'+
        '<label>Description</label><textarea id="desc" placeholder="What did you find?"></textarea>'+
        '<label>Remark (optional) — e.g. repair / work-order no.</label><input id="remark" placeholder="WO-2026-0001">'+
        '<label>Assign to (person or group)</label><select id="owner">'+asg+'</select>'+
        '<label>Due date</label><input type="date" id="due">'+
        '<label>Before photos (required, max '+BOOT.maxPhotos+')</label>'+
        '<div class="thumbs" id="thumbs"></div>'+
        '<div class="err" id="err"></div>'+
        '<button class="btn" id="save" onclick="saveFinding()">Submit finding</button>'+
        '</div>');
      renderThumbs();
    }
    function renderThumbs(){
      var t=document.getElementById('thumbs');var h='';
      beforeFiles.forEach(function(f,i){h+='<div class="thumb"><img src="'+f.preview+'"><div class="x" onclick="rmFile('+i+')">×</div></div>';});
      if(beforeFiles.length<BOOT.maxPhotos) h+='<div class="add-photo" onclick="pickFile()">+</div>';
      t.innerHTML=h;
    }
    function pickFile(){
      var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';
      inp.onchange=function(){var file=inp.files[0];if(!file)return;
        var rd=new FileReader();rd.onload=function(e){beforeFiles.push({file:file,preview:e.target.result});renderThumbs();};
        rd.readAsDataURL(file);};
      inp.click();
    }
    function rmFile(i){beforeFiles.splice(i,1);renderThumbs();}

    /* ---------- toast (corner notification) ---------- */
    function toast(msg,opts){
      opts=opts||{};
      var t=document.getElementById('toast');
      if(!t){t=document.createElement('div');t.id='toast';
        t.style.cssText='position:fixed;left:50%;bottom:18px;transform:translateX(-50%);max-width:90%;font-size:13px;font-weight:600;padding:11px 16px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:80;text-align:center;color:#fff';
        document.body.appendChild(t);}
      t.style.background=opts.error?'#B91C1C':(opts.ok?'#0F766E':'#0F172A');
      t.style.cursor=opts.retry?'pointer':'default';
      t.innerHTML=esc(msg)+(opts.retry?' <u style="margin-left:6px">ลองใหม่</u>':'');
      t.onclick=opts.retry||null;
      t.style.display='block';
      if(t._tm)clearTimeout(t._tm);
      if(opts.ttl)t._tm=setTimeout(function(){t.style.display='none';},opts.ttl);
    }
    function hideToast(){var t=document.getElementById('toast');if(t)t.style.display='none';}

    /* Create the finding (fast), return the user to the list immediately, then
       upload the before-photos in the BACKGROUND. The finding row already exists,
       so a failed photo is non-destructive and retryable from the toast. */
    function saveFinding(){
      if(BUSY)return;
      var err=document.getElementById('err');
      if(!beforeFiles.length){err.textContent='ต้องมีรูป Before อย่างน้อย 1 รูป';return;}
      var btn=document.getElementById('save');btn.disabled=true;btn.textContent='กำลังบันทึก…'; busyOn('กำลังบันทึก…');
      var payload={area:val('area'),category:val('cat'),severity:val('sev'),
        description:val('desc'),remark:val('remark'),ownerEmpId:val('owner'),dueDate:val('due')};
      var files=beforeFiles.slice();
      api('genbaCreate',{payload:payload}).then(function(r){
        busyOff();
        if(!r.ok){btn.disabled=false;btn.textContent='Submit finding';err.textContent=r.error||r.reason||'error';return;}
        beforeFiles=[]; lcDel('genbaInit');
        renderList();                                   // back to list right away
        uploadBackground(r.findingId, files, 0);        // photos upload in background
      });
    }
    function uploadBackground(fid,files,startIdx){
      function step(i){
        if(i>=files.length){
          toast('อัปโหลดรูปเสร็จ ✓',{ok:true,ttl:2500});
          lcDel('genbaInit');
          if(document.getElementById('title')&&document.getElementById('title').textContent==='Genba & 5S Walk') renderList();
          return;
        }
        toast('บันทึกแล้ว — กำลังอัปโหลดรูป '+(i+1)+'/'+files.length+'…');
        resize(files[i].file).then(function(b64){
          return api('genbaPhoto',{findingId:fid,phase:'before',base64:b64,mimeType:'image/jpeg'});
        }).then(function(r){
          if(!r||!r.ok){ toast('อัปโหลดรูปที่ '+(i+1)+' ไม่สำเร็จ — แตะเพื่อลองใหม่',
            {error:true,retry:function(){hideToast();uploadBackground(fid,files,i);}}); return; }
          step(i+1);
        }).catch(function(){ toast('อัปโหลดรูปไม่สำเร็จ — แตะเพื่อลองใหม่',
          {error:true,retry:function(){hideToast();uploadBackground(fid,files,i);}}); });
      }
      step(startIdx||0);
    }
    function val(id){return document.getElementById(id).value;}

    /* ---------- detail ---------- */
    function openFinding(fid){
      document.getElementById('fab').classList.add('hidden');
      document.getElementById('back').style.visibility='visible'; setTitle('Finding');
      show('<div class="spinner"></div>');
      api('genbaGet',{findingId:fid}).then(function(r){
        if(!r.ok){show('<div class="empty">not found</div>');return;}
        renderDetail(r.finding,r.photos);
      });
    }
    function renderDetail(f,photos){
      var st=f.status.replace(/\s/g,'');
      var before=photos.filter(function(p){return p.phase==='before';});
      var after=photos.filter(function(p){return p.phase==='after';});
      var gal=function(arr){return arr.length? '<div class="gallery">'+arr.map(function(p){return '<a href="'+esc(p.url)+'" target="_blank"><img src="'+esc(thumb(p.url,400))+'" referrerpolicy="no-referrer" loading="lazy"></a>';}).join('')+'</div>':'<div class="empty" style="padding:8px">none</div>';};
      var h='<div class="card" style="display:block">'+
        '<div class="row"><b>'+esc(f.areaName)+'</b> <span class="badge s-'+st+'">'+esc(f.status)+'</span></div>'+
        '<div class="row">'+esc(f.categoryName)+' · '+esc(f.severity)+'</div>'+
        '<div class="row">'+esc(f.description||'-')+'</div>'+
        '<div class="row"><span style="color:var(--muted)">Remark:</span> '+esc(f.remark||'-')+'</div>'+
        '<div class="row" style="color:var(--muted)">By '+esc(f.walker)+' · '+esc(f.date)+' · Assigned: '+esc(assigneeLabel(f.ownerEmpId))+(f.dueDate?(' · due '+esc(f.dueDate)):'')+'</div>'+
        '<div class="sec-title">Before</div>'+gal(before)+
        '<div class="sec-title">After</div>'+gal(after)+'</div>';
      // can this user progress the work? (assignee / group member, or a manager)
      var canAct=(BOOT.perms.indexOf('P_APPROVE')>-1)||(f.ownerEmpId&&(String(f.ownerEmpId)===String(BOOT.empId)||(BOOT.myGroups||[]).indexOf(f.ownerEmpId)>-1));
      // actions
      if(f.status!=='Closed' && (canAct || BOOT.canClose)){
        h+='<div class="card" style="display:block"><div class="sec-title">Update</div>';
        if(canAct){
          h+='<label style="margin-top:2px">Remark (repair / WO no.)</label><input id="remarkEdit" value="'+esc(f.remark||'')+'">';
          h+='<button class="btn sec" style="margin-top:8px" onclick="saveRemark(\''+f.findingId+'\')">Save remark</button>';
          h+='<button class="btn sec" style="margin-top:14px" onclick="setStatus(\''+f.findingId+'\',\'In Progress\')">Mark In Progress</button>';
          h+='<button class="btn sec" style="margin-top:8px" onclick="setStatus(\''+f.findingId+'\',\'Done\')">Mark Done</button>';
        } else {
          h+='<div class="sub" style="margin-bottom:6px">You are not the assignee — view only. Leader/Manager can still close.</div>';
        }
        if(BOOT.canClose){
          h+='<div class="sec-title">Close (needs 1 after photo)</div>';
          h+='<div class="thumbs" id="athumbs"></div>';
          h+='<div class="err" id="aerr"></div>';
          h+='<button class="btn green" onclick="closeFinding(\''+f.findingId+'\')">Verify & Close</button>';
        }
        h+='</div>';
      }
      show(h);
      window._afterFiles=[]; window._curFid=f.findingId; if(BOOT.canClose&&f.status!=='Closed') renderAfterThumbs();
    }
    function renderAfterThumbs(){
      var t=document.getElementById('athumbs');if(!t)return;var h='';
      (window._afterFiles||[]).forEach(function(f,i){h+='<div class="thumb"><img src="'+f.preview+'"><div class="x" onclick="rmAfter('+i+')">×</div></div>';});
      if((window._afterFiles||[]).length<BOOT.maxPhotos) h+='<div class="add-photo" onclick="pickAfter()">+</div>';
      t.innerHTML=h;
    }
    function pickAfter(){
      var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';
      inp.onchange=function(){var file=inp.files[0];if(!file)return;var rd=new FileReader();
        rd.onload=function(e){window._afterFiles.push({file:file,preview:e.target.result});renderAfterThumbs();};rd.readAsDataURL(file);};
      inp.click();
    }
    function rmAfter(i){window._afterFiles.splice(i,1);renderAfterThumbs();}

    /* Optimistic: reflect the change instantly (no spinner), sync in background, revert on error. */
    function setStatus(fid,status){
      if(BUSY)return; BUSY=true;
      var b=document.querySelector('.badge'); var pT=b?b.textContent:'', pC=b?b.className:'';
      if(b){b.textContent=status;b.className='badge s-'+status.replace(/\s/g,'');}
      lcDel('genbaInit');                 // list now stale
      api('genbaStatus',{findingId:fid,status:status}).then(function(r){
        BUSY=false;
        if(!r.ok){ if(b){b.textContent=pT;b.className=pC;} alert(r.error||r.reason||'error'); return; }
        openFinding(fid);                                     // authoritative re-render
      });
    }
    function saveRemark(fid){
      if(BUSY)return; BUSY=true;
      var v=document.getElementById('remarkEdit').value;
      var btn=(window.event&&window.event.target)||null; if(btn){btn.textContent='Saved ✓';}
      lcDel('genbaInit');
      api('genbaRemark',{findingId:fid,remark:v}).then(function(r){
        BUSY=false;
        if(!r.ok){ if(btn)btn.textContent='Save remark'; alert(r.error||r.reason||'error'); }
      });
    }
    function closeFinding(fid){
      if(BUSY)return;
      var err=document.getElementById('aerr');
      if(!window._afterFiles||!window._afterFiles.length){err.textContent='Add at least 1 after photo.';return;}
      busyOn('Uploading after photos…');
      uploadAfterThenClose(fid,window._afterFiles.slice(),0,err);
    }
    function uploadAfterThenClose(fid,files,i,err){
      if(i>=files.length){
        busyOn('Closing…');
        api('genbaStatus',{findingId:fid,status:'Closed',note:''}).then(function(r){
          busyOff();
          if(!r.ok){err.textContent=r.reason==='need_after_photo'?'After photo required':(r.error||r.reason);return;}
          renderList();
        });return;
      }
      busyOn('Uploading after '+(i+1)+'/'+files.length+'…');
      resize(files[i].file).then(function(b64){return api('genbaPhoto',{findingId:fid,phase:'after',base64:b64,mimeType:'image/jpeg'});})
        .then(function(r){if(!r.ok){busyOff();err.textContent=r.error||r.reason;return;}uploadAfterThenClose(fid,files,i+1,err);});
    }

    /* ---------- nav ---------- */
    function goBack(){ if(document.getElementById('title').textContent==='Genba & 5S Walk'){ try{liff.closeWindow();}catch(e){} } else { renderList(); } }

    boot();
  </script>
</body>
</html>
